<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audiovisual — Pantallas y programación</title>
<link rel="stylesheet" href="panel.css">
<link rel="icon" href="fonts/clausina-icono.png">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<style>
  header .logo b{color:#1ec9ff;}
  .wrap{padding:18px 28px 60px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;}
  .ft{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;color:var(--white);font-weight:700;}
  .ibtn{background:transparent;border:1px solid var(--line);color:var(--ash);font-family:'IBM Plex Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;padding:6px 11px;border-radius:5px;cursor:pointer;text-decoration:none;display:inline-block;}
  .ibtn:hover{color:var(--chalk);border-color:var(--ash);}
  .ibtn.fire{color:var(--ember);border-color:#1d3a44;}
  .ibtn.fire:hover{background:var(--fire);border-color:var(--fire);color:#0c0c0a;}
  .screen{border:1px solid var(--line);border-radius:9px;background:#0c0c0a;margin-bottom:16px;overflow:hidden;}
  .shead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:13px 16px;border-bottom:1px solid var(--line);background:#0e0e0c;}
  .shead h3{margin:0;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--white);font-weight:700;display:flex;align-items:center;gap:8px;}
  .shead .meta{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--ash);display:flex;flex-wrap:wrap;gap:3px 12px;}
  .shead .sacts{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;background:#555;display:inline-block;flex:0 0 auto;}
  .dot.on{background:#5ec27a;} .dot.off{background:#b4503c;}
  .plist{padding:10px 16px 14px;display:flex;flex-direction:column;gap:7px;}
  .pgline{display:flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:#080806;}
  .pgline.act{border-color:var(--fire);}
  .pgline .sp{flex:1;min-width:0;}
  .pgline .tt{font-weight:700;color:var(--white);font-size:1rem;}
  .pgline .mm{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--ash);}
  .actbadge{font-family:'IBM Plex Mono',monospace;font-size:.56rem;text-transform:uppercase;color:#0c0c0a;background:#5ec27a;border-radius:9px;padding:1px 7px;margin-left:6px;}
  .pgline .pacts{display:flex;gap:5px;flex-wrap:wrap;}
  .empty{color:var(--ash);font-size:.85rem;padding:4px 2px;display:flex;align-items:center;}
  .active{padding:11px 16px 14px;}
  .ahead{font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:var(--chalk);display:flex;align-items:center;flex-wrap:wrap;gap:6px 10px;margin-bottom:10px;}
  .ahead b{color:var(--white);font-weight:700;font-size:.82rem;}
  .liveb{background:var(--fire);color:#0c0c0a;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-radius:9px;padding:2px 8px;}
  .aacts{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
  .avstrip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .avth{flex:0 0 auto;width:80px;}
  .avth img{width:80px;height:120px;object-fit:cover;border-radius:6px;background:#000;display:block;}
  .avlbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--ash);margin-top:4px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
  .mbadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.5rem;text-transform:uppercase;border-radius:7px;padding:1px 5px;background:#2a2a24;color:var(--chalk);}
  .mbadge.cortafuego{background:#0f2a33;color:var(--ember);}
  .mbadge.ardora{background:#102a2a;color:#5ec2b0;}
  .form{border:1px solid var(--ember);border-radius:8px;background:#0c0c0a;padding:16px;margin-bottom:16px;display:none;flex-direction:column;gap:10px;max-width:560px;}
  .form.show{display:flex;}
  .form .row{display:flex;gap:10px;flex-wrap:wrap;}
  .form label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ash);display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
  .form input[type=text],.form input[type=number]{background:#080806;border:1px solid var(--line);border-radius:5px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:1rem;padding:8px 10px;outline:none;}
  .form input:focus{border-color:var(--ember);}
  .form .chk{flex-direction:row;align-items:center;gap:7px;min-width:0;}
</style>
</head>
<body class="av">
  <header>
    <a class="logo" href=".">Cla<b>U</b>sina<b>.</b></a>
    <span class="sub">Audiovisual · Pantallas y programación</span>
    <span class="upd" id="upd"></span>
    <nav>
      <a href=".">Panel principal</a>
      <button class="logout" onclick="salir()">Salir</button>
    </nav>
  </header>
  <div id="toast"></div>
  <div class="wrap">
    <div class="toolbar">
      <div class="ft">Pantallas <span class="n" id="n-pa"></span></div>
      <button class="ibtn fire" onclick="nueva()">+ Agregar pantalla</button>
    </div>

    <div class="form" id="form">
      <div class="ft" id="form-tt">Nueva pantalla</div>
      <input type="hidden" id="f-id">
      <div class="row">
        <label>Nombre<input type="text" id="f-nombre" maxlength="120" placeholder="Pantalla Esquina Paseo Ardora"></label>
        <label>Ubicación<input type="text" id="f-ubic" maxlength="200" placeholder="Ochava Av. Valentín Vergara"></label>
      </div>
      <div class="row">
        <label>Ancho (px)<input type="number" id="f-ancho" min="0" placeholder="1080"></label>
        <label>Alto (px)<input type="number" id="f-alto" min="0" placeholder="1620"></label>
        <label class="chk">Activa <input type="checkbox" id="f-activo" checked></label>
      </div>
      <label>Player(s) VNNOX (IDs separados por coma)<input type="text" id="f-players" placeholder="dba8454…"></label>
      <div class="row" style="margin-top:4px">
        <button class="ibtn fire" onclick="guardarPantalla()">Guardar</button>
        <button class="ibtn" onclick="cerrarForm()">Cancelar</button>
      </div>
    </div>

    <div id="screens"></div>
  </div>
<script src="panel.js"></script>
<script>
let pantallas=[];
const byId=id=>pantallas.find(p=>p.id===id);
const dim=p=>(p.ancho&&p.alto)?`${p.ancho}×${p.alto}`:'resolución sin definir';
const _mn = s => (s||'').split('—')[0].split('|')[0].trim();
const mBadge = a => a.marca_slug ? `<span class="mbadge ${esc(a.marca_slug)}">${esc(_mn(a.marca_nombre)||a.marca_slug)}</span>` : '';
let actv=false;

async function cargar(){
  try{
    const r=await fetch('api/pantallas'); if(r.status===401){location.href='login';return;}
    pantallas=await r.json();   // cada pantalla ya trae su programa activo (con avisos)
    document.getElementById('n-pa').textContent=pantallas.length||'';
    document.getElementById('screens').innerHTML = pantallas.length ? pantallas.map(card).join('') : '<div class="empty">— sin pantallas; agregá la primera —</div>';
    const u=document.getElementById('upd'); if(u) u.textContent='actualizado '+new Date().toLocaleTimeString('es-AR');
  }catch(e){}
}
function card(p){
  const on = p.online===true?'<span class="dot on" title="online"></span>':(p.online===false?'<span class="dot off" title="offline"></span>':'<span class="dot" title="estado desconocido"></span>');
  const pr = p.programa;
  let block;
  if(pr){
    const its = pr.items||[];
    const tot = its.reduce((s,it)=>s+(it.duracion_s||10),0);
    const strip = its.length ? its.map(it=>{
      const poster=(it.media||{}).poster_url||(it.media||{}).url||'';
      return `<div class="avth"><img loading="lazy" src="${esc(poster)}" onerror="this.style.opacity=.15"><div class="avlbl">${mBadge(it)}#${String(it.numero).padStart(4,'0')} · ${it.duracion_s||10}s</div></div>`;
    }).join('') : '<div class="empty">— el programa no tiene avisos —</div>';
    block = `<div class="active">
      <div class="ahead"><span class="liveb">EN PANTALLA</span> <b>${esc(pr.nombre)}</b> · ${its.length} aviso(s) · ~${tot}s
        <span class="aacts">
          <a class="ibtn" href="play?pantalla=${encodeURIComponent(p.slug)}" target="_blank" rel="noopener">▶ Reproductor</a>
          ${its.length?`<button class="ibtn" onclick="descargarP('${pr.id}','${esc(pr.nombre)}','${esc(p.slug)}',this)">Descargar</button>`:''}
          ${its.length?`<button class="ibtn fire" onclick="enviarP('${pr.id}','${esc(pr.nombre)}','${esc(p.slug)}',this)">A la pantalla</button>`:''}
        </span>
      </div>
      <div class="avstrip">${strip}</div>
    </div>`;
  } else {
    block = `<div class="active"><div class="empty">— Sin programa activo — &nbsp;<a class="ibtn fire" href="programacion?pantalla=${encodeURIComponent(p.slug)}">Programar</a></div></div>`;
  }
  return `<div class="screen">
    <div class="shead">
      <h3>${on}${esc(p.nombre)} ${p.activo?'':'<span class="meta">(inactiva)</span>'}</h3>
      <div class="meta"><span>${esc(p.ubicacion||'—')}</span><span>${dim(p)}</span><span>players: ${(p.vnnox_player_ids||[]).length}</span></div>
      <div class="sacts">
        <a class="ibtn fire" href="programacion?pantalla=${encodeURIComponent(p.slug)}">Programar</a>
        <button class="ibtn" onclick="editarPantalla('${p.id}')">Editar pantalla</button>
        <button class="ibtn" onclick="eliminarPantalla('${p.id}','${esc(p.nombre)}')">Eliminar</button>
      </div>
    </div>
    ${block}
  </div>`;
}

/* ---- acciones sobre el programa activo (van a la pantalla del slug) ---- */
async function descargarP(id,nombre,slug,btn){
  const t=btn.textContent; btn.disabled=true; btn.textContent='Generando…';
  try{
    const r=await fetch('api/programas/'+id+'/download?pantalla='+encodeURIComponent(slug));
    if(!r.ok){ toast('No se pudo generar el zip',true); return; }
    const blob=await r.blob(); const s=(nombre||'programa').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'programa';
    const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='programa-'+s+'.zip';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); toast('Descarga lista');
  }catch(e){ toast('Error al descargar',true); } finally{ btn.disabled=false; btn.textContent=t; }
}
async function enviarP(id,nombre,slug,btn){
  if(!confirm('Publicar "'+nombre+'" en la pantalla LED (vía VNNOX). Cambia lo que se ve. ¿Confirmás?')) return;
  const t=btn.textContent; btn.disabled=true; btn.textContent='Enviando…';
  try{
    const r=await fetch('api/programas/'+id+'/enviar-pantalla?pantalla='+encodeURIComponent(slug),{method:'POST'});
    const d=await r.json().catch(()=>({}));
    if(r.ok&&d.ok) toast('Enviado — la pantalla está descargando el programa');
    else { toast('No se pudo enviar ('+(d.error||d.status||r.status)+')',true); console.log('VNNOX:',d); }
  }catch(e){ toast('Error de conexión con VNNOX',true); } finally{ btn.disabled=false; btn.textContent=t; }
}

/* ---- pantallas: alta / edición / baja ---- */
function nueva(){
  document.getElementById('form-tt').textContent='Nueva pantalla';
  ['f-id','f-nombre','f-ubic','f-ancho','f-alto','f-players'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-activo').checked=true;
  document.getElementById('form').classList.add('show'); window.scrollTo({top:0,behavior:'smooth'});
}
function editarPantalla(id){
  const p=byId(id); if(!p) return;
  document.getElementById('form-tt').textContent='Editar pantalla';
  document.getElementById('f-id').value=p.id;
  document.getElementById('f-nombre').value=p.nombre||'';
  document.getElementById('f-ubic').value=p.ubicacion||'';
  document.getElementById('f-ancho').value=p.ancho||'';
  document.getElementById('f-alto').value=p.alto||'';
  document.getElementById('f-players').value=(p.vnnox_player_ids||[]).join(', ');
  document.getElementById('f-activo').checked=!!p.activo;
  document.getElementById('form').classList.add('show'); window.scrollTo({top:0,behavior:'smooth'});
}
function cerrarForm(){ document.getElementById('form').classList.remove('show'); }
async function guardarPantalla(){
  const id=document.getElementById('f-id').value;
  const body={ nombre:document.getElementById('f-nombre').value.trim(), ubicacion:document.getElementById('f-ubic').value.trim(),
    ancho:document.getElementById('f-ancho').value||null, alto:document.getElementById('f-alto').value||null,
    vnnox_player_ids:document.getElementById('f-players').value, activo:document.getElementById('f-activo').checked };
  if(!body.nombre){ toast('Poné un nombre',true); return; }
  try{
    const r = id ? await fetch('api/pantallas/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
                 : await fetch('api/pantallas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({}));
    if(r.ok&&(d.ok!==false)){ toast(id?'Pantalla actualizada':'Pantalla creada'); cerrarForm(); cargar(); }
    else toast('No se pudo guardar ('+(d.error||r.status)+')',true);
  }catch(e){ toast('Error de conexión',true); }
}
async function eliminarPantalla(id,nombre){
  if(!confirm('Eliminar la pantalla "'+nombre+'"?')) return;
  try{
    const r=await fetch('api/pantallas/'+id,{method:'DELETE'}); const d=await r.json().catch(()=>({}));
    if(r.ok&&d.ok){ toast('Eliminada'); cargar(); }
    else if(d.error==='tiene_programas') toast('No se puede: tiene '+d.n+' programa(s). Borralos primero.',true);
    else toast('No se pudo eliminar',true);
  }catch(e){ toast('Error de conexión',true); }
}
cargar();
</script>
</body>
</html>
