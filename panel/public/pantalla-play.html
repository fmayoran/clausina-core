<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cortafuego — Pantalla</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:none;}
  .stage{position:fixed;inset:0;background:#000;}
  /* contain = respeta el formato del aviso (no recorta). En la pantalla 2:3 llena exacto;
     en una ventana de otro aspecto, bandas negras en vez de perder imagen. */
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .5s linear;background:#000;}
  video.on{opacity:1;}
  #idle{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#080806;color:#3a3a33;font-family:sans-serif;font-weight:900;letter-spacing:.1em;font-size:5vw;}
</style>
</head>
<body>
  <div class="stage">
    <video id="vA" muted playsinline preload="auto"></video>
    <video id="vB" muted playsinline preload="auto"></video>
  </div>
  <div id="idle"></div>
<script>
// Cada pantalla pertenece a una marca: se elige con ?marca=<slug> en la URL del player.
const MARCA=new URLSearchParams(location.search).get('marca')||'';
const API='api/pantalla/activo'+(MARCA?('?marca='+encodeURIComponent(MARCA)):'');
document.getElementById('idle').textContent=(MARCA||'cortafuego').toUpperCase();
let items=[], version='', idx=0, pending=null, started=false, busy=false;
let cur=document.getElementById('vA'), nxt=document.getElementById('vB');
const idle=document.getElementById('idle');
const show=v=>v.classList.add('on'), hide=v=>v.classList.remove('on');
const clearV=v=>{ v.onended=null; v.ontimeupdate=null; v.oncanplay=null; };
const pauseV=v=>{ try{ v.pause(); }catch(e){} };

function startVideo(v, i, onPlaying){
  clearV(v);
  v.src=items[i]; v.load();
  v.oncanplay=()=>{
    v.oncanplay=null; v.play().catch(()=>{});
    v.ontimeupdate=()=>{ if(v.duration && v.currentTime >= v.duration-0.5) advance(); };
    v.onended=()=>advance();
    if(onPlaying) onPlaying();
  };
}
function start(){
  if(!items.length){ idle.style.display='flex'; return; }
  idle.style.display='none'; started=true; idx=0;
  startVideo(cur, idx, ()=>show(cur));
}
function advance(){
  if(busy) return;                 // un solo avance por transición (timeupdate + ended no se duplican)
  busy=true;
  clearV(cur);                     // el aviso saliente deja de disparar eventos (no más "vuelta" fantasma)
  if(pending){ items=pending; pending=null; idx=0; }   // playlist nueva al cerrar el ítem
  else { idx=(idx+1)%items.length; }
  if(!items.length){ hide(cur); pauseV(cur); idle.style.display='flex'; started=false; busy=false; return; }
  startVideo(nxt, idx, ()=>{
    show(nxt); hide(cur);
    const old=cur; cur=nxt; nxt=old;
    setTimeout(()=>{ pauseV(nxt); clearV(nxt); busy=false; }, 550);  // pausa al saliente tras el fundido
  });
}
async function poll(){
  try{
    const d=await fetch(API,{cache:'no-store'}).then(r=>r.json());
    if(d.version!==version){
      version=d.version;
      const urls=(d.items||[]).map(x=>x.url).filter(Boolean);
      if(!started){ items=urls; idx=0; start(); }          // primer arranque
      else if(urls.length===0){ pending=[]; }              // se vació -> idle en el próximo límite
      else { pending=urls; }                                // cambio -> se aplica al cerrar el ítem actual
    }
  }catch(e){}
}
poll(); setInterval(poll, 45000);
</script>
</body>
</html>
