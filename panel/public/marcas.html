<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaUsina — Marcas</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<script>try{if(localStorage.getItem('clausina-mode')!=='light')document.documentElement.classList.add('dark');}catch(e){document.documentElement.classList.add('dark');}</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
<style>
  .mtx{width:100%;border-collapse:separate;border-spacing:0;min-width:720px;}
  .mtx th,.mtx td{padding:14px 12px;text-align:left;border-bottom:1px solid #E6E3DD;}
  .dark .mtx th,.dark .mtx td{border-bottom-color:#20242B;}
  .mtx tbody tr:last-child th,.mtx tbody tr:last-child td{border-bottom:0;}
  .mtx thead th{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:400;white-space:nowrap;}
  .mtx tbody tr:hover{background:rgba(127,127,127,.06);}
  .mtx td.marca{white-space:nowrap;}
  .cst{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:.66rem;white-space:nowrap;}
  .cdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .ok  .cdot{background:#CCF24D;} .ok{color:#CCF24D;}
  .cfg .cdot{background:#FF6A45;} .cfg{color:#FF6A45;}
  .off .cdot{background:currentColor;opacity:.35;}
  .scrollx{overflow-x:auto;}
</style>
</head>
<body class="bg-paper text-pfg dark:bg-ink dark:text-fg transition-colors">
<div class="shell">
  <main class="px-6 md:px-9 py-8 min-w-0">
    <div class="flex items-baseline gap-3 mb-1">
      <h1 class="display font-bold text-xl tracking-tight">Marcas</h1>
      <span class="mono text-[11px] text-pmut dark:text-mut" id="sub">cargando…</span>
    </div>
    <p class="mono text-[11px] text-pmut dark:text-mut mb-7">Qué tiene configurada cada marca. <b>Identidad</b>, <b>Brief</b> y <b>Biblioteca</b> están siempre activas.</p>

    <div class="rounded-2xl bg-psurf dark:bg-surf border border-pline dark:border-line card scrollx">
      <table class="mtx">
        <thead><tr id="mtx-head"></tr></thead>
        <tbody id="mtx-body"></tbody>
      </table>
    </div>

    <div class="mono text-[10px] text-pmut dark:text-mut" style="display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:20px;">
      <span class="cst ok"><span class="cdot"></span>activa</span>
      <span class="cst cfg"><span class="cdot"></span>falta configurar</span>
      <span class="cst off text-pmut dark:text-mut"><span class="cdot"></span>deshabilitada</span>
    </div>
  </main>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="shell.js"></script>
<script>ClausinaShell({active:'marcas'});</script>
<script>
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
async function entrar(slug){ try{ await fetch('api/marca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug})}); }catch(_){} location.href='proyecto'; }

function celda(c){
  if(!c.habilitada) return `<span class="cst off text-pmut dark:text-mut"><span class="cdot"></span>—</span>`;
  if(c.configurada) return `<span class="cst ok"><span class="cdot"></span>activa</span>`;
  return `<span class="cst cfg" title="Falta: ${esc(c.faltan.join(', '))}"><span class="cdot"></span>falta config.</span>`;
}
function filaMarca(m){
  const ini = (m.nombre||'?').trim().charAt(0).toUpperCase();
  const logo = m.logo
    ? `<img src="${esc(m.logo)}" alt="" class="w-8 h-8 rounded-lg object-contain bg-black/5 dark:bg-white/5 p-1 shrink-0">`
    : `<span class="grid place-items-center w-8 h-8 rounded-lg bg-acc text-accink display font-bold text-xs shrink-0">${esc(ini)}</span>`;
  const activas = m.capacidades.filter(c=>c.habilitada && c.configurada).length;
  const faltan  = m.capacidades.filter(c=>c.habilitada && !c.configurada).length;
  return `<tr>
    <td class="marca">
      <a href="#" onclick="entrar('${esc(m.slug)}');return false;" class="flex items-center gap-3 group">
        ${logo}
        <span class="min-w-0">
          <span class="display font-bold text-base tracking-tight block truncate group-hover:acc-text transition">${esc(m.nombre)}</span>
          <span class="mono text-[10px] text-pmut dark:text-mut">${activas} activa(s)${faltan?` · ${faltan} por configurar`:''}</span>
        </span>
      </a>
    </td>
    ${m.capacidades.map(c=>`<td>${celda(c)}</td>`).join('')}
  </tr>`;
}
(async ()=>{
  try{
    const r = await fetch('api/capacidades/todas');
    if(r.status===401){ location.href='login'; return; }
    const marcas = await r.json();
    if(!marcas.length){ document.getElementById('sub').textContent='sin marcas'; return; }
    const caps = marcas[0].capacidades;
    document.getElementById('mtx-head').innerHTML =
      `<th class="text-pmut dark:text-mut">Marca</th>` +
      caps.map(c=>`<th class="text-pmut dark:text-mut">${esc(c.label)}</th>`).join('');
    if(window.fixIgIcons) window.fixIgIcons();
    document.getElementById('mtx-body').innerHTML = marcas.map(filaMarca).join('');
    document.getElementById('sub').textContent = `${marcas.length} marca(s)`;
    if(window.lucide) lucide.createIcons();
  }catch(e){ document.getElementById('sub').textContent='error al cargar'; }
})();
</script>
</body>
</html>
