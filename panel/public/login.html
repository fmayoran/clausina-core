<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaUsina — Acceso</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<style>
  :root{--bg:#0A0B0D;--panel:#111317;--line:#20242B;--chalk:#ECEEF0;--white:#F5F2EC;--ash:#8A8F98;--fire:#CCF24D;--ember:#CCF24D;--alarm:#FF6A45;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--chalk);font-family:'Inter Tight',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:38px 34px;width:100%;max-width:380px;}
  .iso{width:64px;height:64px;border-radius:14px;display:block;margin-bottom:18px;}
  .logo{font-weight:900;font-size:2rem;letter-spacing:.04em;color:var(--white);}
  .logo b.dot{color:#CCF24D;}
  .sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ash);margin-top:4px;margin-bottom:28px;}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);margin-bottom:8px;}
  input{width:100%;background:#0c0c0a;border:1px solid var(--line);border-radius:6px;color:var(--white);font-family:'Inter Tight',sans-serif;font-size:1.1rem;padding:11px 13px;outline:none;}
  input:focus{border-color:var(--ember);}
  button{width:100%;margin-top:18px;background:var(--fire);color:#0c0c0a;border:none;border-radius:6px;font-family:'Inter Tight',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:.05em;text-transform:uppercase;padding:11px;cursor:pointer;transition:.15s;}
  button:hover{background:var(--ember);}
  button:disabled{opacity:.55;cursor:default;}
  .err{margin-top:14px;min-height:1.1em;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--alarm);letter-spacing:.04em;}
</style>
</head>
<body>
  <form class="card" onsubmit="entrar(event)">
    <img class="iso" src="favicon.svg" alt="ClaUsina">
    <div class="logo">Cla<b>U</b>sina<b class="dot">.</b></div>
    <div class="sub">Agencia · impulsada por Claude</div>
    <label for="pw">Contraseña</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus>
    <button id="btn" type="submit">Entrar</button>
    <div class="err" id="err"></div>
  </form>
<script>
async function entrar(e){
  e.preventDefault();
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  err.textContent=''; btn.disabled=true; btn.textContent='Entrando…';
  try{
    const r=await fetch('api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
    if(r.ok){ location.href='.'; return; }
    err.textContent='Contraseña incorrecta.';
  }catch(_){ err.textContent='Error de conexión.'; }
  btn.disabled=false; btn.textContent='Entrar';
  document.getElementById('pw').select();
}
</script>
</body>
</html>
