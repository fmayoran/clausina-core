<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfil del proyecto</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script>document.documentElement.classList.add('dark');</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
<link rel="stylesheet" href="panel.css">
<style>
  .wrap{padding:18px 28px 70px;max-width:1100px;}
  .intro{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--ash);margin-bottom:14px;line-height:1.5;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}
  .fld{display:flex;flex-direction:column;gap:5px;}
  .fld.full{grid-column:1/-1;}
  .fld label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ember);}
  .sect{grid-column:1/-1;font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);border-bottom:1px solid var(--line);padding-bottom:6px;margin-top:8px;}
  .fld .hint{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--ash);text-transform:none;letter-spacing:0;}
  textarea,input[type=text]{background:#0c0c0a;border:1px solid var(--line);border-radius:6px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:1.02rem;line-height:1.35;padding:10px 11px;outline:none;resize:vertical;}
  textarea{min-height:80px;}
  textarea:focus,input[type=text]:focus{border-color:var(--ember);}
  .full textarea{min-height:360px;}
  .bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 30%);padding:16px 0 4px;display:flex;align-items:center;gap:14px;margin-top:16px;}
  .ibtn{background:transparent;border:1px solid var(--ember);color:var(--ember);font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;padding:9px 18px;border-radius:6px;cursor:pointer;}
  .ibtn:hover{background:var(--fire);border-color:var(--fire);color:#0c0c0a;}
  .upd2{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--ash);}
  /* Estilo de marca */
  .est-empty{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--ash);line-height:1.5;}
  .est-block{margin-bottom:18px;}
  .est-h{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ember);margin-bottom:9px;}
  .est-logos{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .est-tile{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:11px;padding:16px 22px;background:var(--panel);min-width:90px;}
  .est-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .est-sw{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel);}
  .est-sw .chip{height:44px;}
  .est-sw .lab{padding:7px 9px;font-family:'JetBrains Mono',monospace;font-size:.56rem;}
  .est-sw .lab b{display:block;color:var(--white);text-transform:uppercase;letter-spacing:.05em;font-weight:400;font-size:.62rem;}
  .est-sw .lab span{color:var(--ash);}
  .est-type{display:flex;flex-direction:column;gap:9px;}
  .est-trow{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line);padding-bottom:9px;}
  .est-trow .rol{font-family:'JetBrains Mono',monospace;font-size:.56rem;text-transform:uppercase;color:var(--ash);width:62px;flex:0 0 auto;}
  .est-trow .sam{color:var(--white);font-size:1.15rem;min-width:0;}
  .est-trow .fn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--ash);flex:0 0 auto;}
  .est-voz{display:flex;gap:8px;flex-wrap:wrap;}
  .est-voz span{font-family:'JetBrains Mono',monospace;font-size:.62rem;border:1px solid var(--line);border-radius:8px;padding:4px 9px;color:var(--chalk);}
  .est-link{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--ember);text-decoration:none;}
  .est-link:hover{color:var(--fire);}
</style>
</head>
<body>
  <header>
    <a class="logo" href=".">CORTA<b>FUEGO</b></a>
    <span class="sub">Perfil del proyecto</span>
    <span class="upd" id="upd"></span>
    <nav>
      <a href=".">← Agencia</a>
      <button class="logout" onclick="salir()">Salir</button>
    </nav>
  </header>
<div class="shell"><main class="min-w-0">
  <div id="toast"></div>
  <div class="wrap">
    <div class="intro">Registro de marca que consume el creativo. Es la fuente de verdad del contexto. Para cambiar de proyecto, volvé al panel principal (Agencia).</div>
    <div class="grid">
      <div class="fld"><label>Marca</label><input type="text" id="nombre"></div>
      <div class="fld"><label>Slogan</label><input type="text" id="slogan"></div>

      <div class="sect">Canales y enlaces</div>
      <div class="fld"><label>Instagram <span class="hint">— usuario de la cuenta, con @</span></label><input type="text" id="ig_handle" placeholder="@cuenta"></div>
      <div class="fld"><label>Web <span class="hint">— dominio del sitio</span></label><input type="text" id="dominio_web" placeholder="marca.ar"></div>
      <div class="fld"><label>Email del proyecto <span class="hint">— de la marca, para email marketing / contacto (los avisos del sistema salen de ClaUsina)</span></label><input type="text" id="email" placeholder="hola@marca.ar"></div>
      <div class="fld"><label>WhatsApp <span class="hint">— número de la marca para interactuar con clientes (formato +54...)</span></label><input type="text" id="whatsapp" placeholder="+54 9 11 ..."></div>
      <div class="fld"><label>IG User ID <span class="hint">— ID de la cuenta en la API de Instagram</span></label><input type="text" id="ig_user_id"></div>
      <div class="fld"><label>Telegram chat ID <span class="hint">— chat para briefs/avisos</span></label><input type="text" id="telegram_chat_id"></div>

      <div class="sect">Identidad y contexto</div>
      <div class="fld full"><label>Logo <span class="hint">— subí el archivo oficial, o pegá una URL/descripción</span></label>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="logoBox" style="display:none;width:44px;height:44px;flex:0 0 auto;border-radius:8px;background:#080806;border:1px solid var(--line);overflow:hidden;position:relative;">
            <img id="logoPrev" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:5px;">
          </span>
          <input type="text" id="logo" style="flex:1;">
          <input type="file" id="logoFile" accept="image/png,image/jpeg,image/webp,image/svg+xml,image/gif" style="display:none;" onchange="subirLogo(this)">
          <button type="button" class="ibtn" id="logoBtn" onclick="document.getElementById('logoFile').click()">Subir…</button>
        </div>
      </div>
      <div class="fld full"><label>Brief <span class="hint">— todo el contexto: propuesta de valor, tono, público, lineamientos visuales, hacer/evitar, productos, datos clave</span></label><textarea id="brief_md"></textarea></div>

      <div class="sect">Estilo de marca <span class="hint" style="text-transform:none;letter-spacing:0;color:var(--ash)">— identidad visual de la marca</span></div>
      <div class="fld full" id="estilo-marca"><div class="est-empty">cargando…</div></div>
    </div>
    <div class="bar">
      <button class="ibtn" onclick="guardar()">Guardar perfil</button>
      <span class="upd2" id="upd2"></span>
    </div>
  </div>
</main></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="shell.js"></script>
<script>ClausinaShell({active:'perfil',darkOnly:true});</script>
<script src="panel.js"></script>
<script>
const CAMPOS=['nombre','slogan','ig_handle','dominio_web','email','whatsapp','ig_user_id','telegram_chat_id','logo','brief_md'];
async function cargar(){
  try{
    const r=await fetch('api/perfil'); if(r.status===401){location.href='login';return;}
    const p=await r.json();
    CAMPOS.forEach(c=>{ const el=document.getElementById(c); if(el) el.value=p[c]||''; });
    mostrarLogo(p.logo||'');
    document.getElementById('upd2').textContent = p.actualizado_en ? ('Última edición: '+fecha(p.actualizado_en)) : 'Sin cargar todavía';
  }catch(e){}
}
async function guardar(){
  const body={}; CAMPOS.forEach(c=>{ body[c]=document.getElementById(c).value; });
  try{
    const d=await fetch('api/perfil',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
    toast(d.ok?'Perfil guardado':'No se pudo guardar',!d.ok);
    if(d.ok) cargar();
  }catch(e){ toast('Error de conexión',true); }
}
function mostrarLogo(v){
  const box=document.getElementById('logoBox'), img=document.getElementById('logoPrev');
  if(v && /^https?:\/\//.test(v)){ img.src=v; box.style.display='inline-block'; }
  else { img.removeAttribute('src'); box.style.display='none'; }
}
async function subirLogo(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const btn=document.getElementById('logoBtn'); const txt=btn.textContent; btn.textContent='Subiendo…'; btn.disabled=true;
  try{
    const dataUrl=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
    const d=await fetch('api/perfil/logo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl})}).then(r=>r.json());
    if(d&&d.ok){ document.getElementById('logo').value=d.url; mostrarLogo(d.url); toast('Logo subido'); }
    else { toast(d&&d.error==='muy_grande'?'Imagen muy grande (máx 5MB)':'No se pudo subir el logo',true); }
  }catch(e){ toast('Error de conexión',true); }
  finally{ btn.textContent=txt; btn.disabled=false; input.value=''; }
}
// --- Estilo de marca (piloto ClaUsina; a futuro, una por marca) ---
const BRAND_STYLE = {
  clausina: {
    paleta:[
      {n:'Lima',hex:'#CCF24D',uso:'acción / marca'},
      {n:'Coral',hex:'#FF6A45',uso:'vivo / alerta'},
      {n:'Ink',hex:'#0A0B0D',uso:'fondo'},
      {n:'Surface',hex:'#111317',uso:'tarjetas'},
      {n:'Tiza',hex:'#ECEEF0',uso:'texto'},
    ],
    tipos:[
      {rol:'Display',fn:'Inter Tight',sam:'ClaUsina',ff:"'Inter Tight',sans-serif",fw:700},
      {rol:'Cuerpo',fn:'Inter',sam:'Comunicación con motor propio.',ff:"'Inter',sans-serif",fw:400},
      {rol:'Datos',fn:'JetBrains Mono',sam:'0123456789 · live',ff:"'JetBrains Mono',monospace",fw:400},
    ],
    voz:['Directo','Técnico, no frío','Soporte, no protagonista'],
  }
};
function uSvg(stroke,dot){
  if(dot) return '<svg viewBox="0 0 28 34" width="26" height="32" fill="none"><path id="epA" d="M5 5 V19 a9 9 0 0 0 18 0 V5" stroke="'+stroke+'" stroke-width="3.4" stroke-linecap="round"/><circle r="2.2" fill="#CCF24D"><animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto"><mpath href="#epA"/></animateMotion></circle></svg>';
  return '<svg viewBox="0 0 28 34" width="26" height="32" fill="none"><path d="M5 5 V19 a9 9 0 0 0 18 0 V5" stroke="'+stroke+'" stroke-width="3.4" stroke-linecap="round"/></svg>';
}
function renderEstilo(slug){
  const box=document.getElementById('estilo-marca'); if(!box) return;
  const s=BRAND_STYLE[slug];
  if(!s){ box.innerHTML='<div class="est-empty">El estilo de esta marca todavía no está definido. ClaUsina es el piloto; el resto lo desarrollamos cuando le toque.</div>'; return; }
  const sw=s.paleta.map(c=>`<div class="est-sw"><div class="chip" style="background:${c.hex}"></div><div class="lab"><b>${c.n}</b><span>${c.hex} · ${c.uso}</span></div></div>`).join('');
  const tp=s.tipos.map(t=>`<div class="est-trow"><span class="rol">${t.rol}</span><span class="sam" style="font-family:${t.ff};font-weight:${t.fw}">${t.sam}</span><span class="fn">${t.fn}</span></div>`).join('');
  const vz=s.voz.map(v=>`<span>${v}</span>`).join('');
  box.innerHTML=`
    <div class="est-block"><div class="est-h">Logo</div><div class="est-logos">
      <div class="est-tile" style="color:#ECEEF0">${uSvg('currentColor',true)}</div>
      <div class="est-tile" style="color:#F5F2EC"><span style="font-family:'Inter Tight',sans-serif;font-weight:700;font-size:1.4rem;display:flex;align-items:center;gap:8px">${uSvg('currentColor',false)}<span>ClaUsina<span style="color:#CCF24D">.</span></span></span></div>
      <div class="est-tile" style="background:#CCF24D">${uSvg('#0A0B0D',false)}</div>
      <a class="est-link" href="logo" style="align-self:center">&rarr; kit completo</a>
    </div></div>
    <div class="est-block"><div class="est-h">Paleta</div><div class="est-grid">${sw}</div></div>
    <div class="est-block"><div class="est-h">Tipografía</div><div class="est-type">${tp}</div></div>
    <div class="est-block"><div class="est-h">Voz</div><div class="est-voz">${vz}</div></div>
    <a class="est-link" href="estilo">&rarr; Ver el sistema de marca completo</a>`;
}
cargar();
fetch('api/marcas').then(r=>r.ok?r.json():null).then(d=>renderEstilo(d&&d.activa)).catch(()=>renderEstilo(null));
</script>
</body>
</html>
