<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaUsina — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<script>try{if(localStorage.getItem('clausina-mode')!=='light')document.documentElement.classList.add('dark');}catch(e){document.documentElement.classList.add('dark');}</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
<style>
  .lamp{width:13px;height:13px;border-radius:50%;background:#9aa0a8;flex:0 0 auto;}
  .lamp.marcha{background:#CCF24D;box-shadow:0 0 0 4px rgba(204,242,77,.18);animation:lb 3.2s ease-in-out infinite;}
  .lamp.espera{background:#E0A458;box-shadow:0 0 0 4px rgba(224,164,88,.18);animation:lb 2s ease-in-out infinite;}
  .lamp.paro{background:#FF6A45;box-shadow:0 0 0 4px rgba(255,106,69,.22);animation:lk 1s steps(1) infinite;}
  @keyframes lb{0%,100%{opacity:1}50%{opacity:.5}} @keyframes lk{0%,49%{opacity:1}50%,100%{opacity:.3}}
  @media(prefers-reduced-motion:reduce){.lamp{animation:none!important}}
</style>
</head>
<body class="bg-paper text-pfg dark:bg-ink dark:text-fg transition-colors">
<div class="shell">

  <!-- chrome (sidebar + topbar + drawer) inyectado por shell.js -->

  <!-- MAIN -->
  <main class="px-6 md:px-9 py-8 min-w-0">
    <div class="flex items-baseline gap-3 mb-4">
      <h1 class="display font-bold text-xl tracking-tight hl"><span>Inicio</span></h1>
      <span class="mono text-[11px] text-pmut dark:text-mut" id="sub">cargando…</span>
      <a href="marcas" title="Ver qué tiene configurada cada marca" aria-label="Ver qué tiene configurada cada marca"
         class="ml-auto self-center grid place-items-center w-9 h-9 rounded-lg border border-pline dark:border-line text-pmut dark:text-mut hover:border-acc hover:acc-text transition shrink-0">
        <i data-lucide="table-properties" class="w-4 h-4"></i>
      </a>
    </div>

    <div class="mono text-[11px] tracking-[0.16em] uppercase text-pmut dark:text-mut mb-3">Sala de máquinas</div>
    <a href="maquinas" class="group block rounded-2xl bg-psurf dark:bg-surf border border-pline dark:border-line card mb-7 p-5 hover:border-acc dark:hover:border-acc transition" title="Ir a Sala de máquinas">
      <div class="flex flex-wrap items-center gap-x-8 gap-y-4">
        <div class="flex items-center gap-3.5">
          <span class="lamp" id="sm-lamp"></span>
          <div><div class="display font-extrabold text-2xl leading-none tracking-tight" id="sm-state">·····</div><div class="mono text-[10px] uppercase tracking-[0.14em] text-pmut dark:text-mut mt-1.5" id="sm-sub">leyendo el motor…</div></div>
        </div>
        <div class="flex flex-wrap gap-x-7 gap-y-3 overflow-x-auto" id="sm-reads"></div>
        <span class="ml-auto grid place-items-center w-10 h-10 rounded-full border border-pline dark:border-line group-hover:border-acc transition shrink-0"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></span>
      </div>
    </a>

    <div class="mono text-[11px] tracking-[0.16em] uppercase text-pmut dark:text-mut mb-3">Las marcas</div>
    <section id="grid" class="grid md:grid-cols-2 gap-4"></section>
  </main>
</div>

<!-- Wizard: sumá una marca -->
<div id="wiz" class="wiz-ov" style="display:none">
  <div class="wiz-bg" onclick="cerrarWizard()"></div>
  <div class="wiz-box">
    <div class="wiz-head">
      <div><div class="wiz-tt">Sumá una marca</div><div class="wiz-step mono" id="wiz-stepn">Paso 1 de 4</div></div>
      <button class="wiz-x" onclick="cerrarWizard()" title="Cerrar">×</button>
    </div>
    <div class="wiz-body" id="wiz-body"></div>
    <div class="wiz-foot">
      <button class="wbtn ghost" id="wiz-back" onclick="wizPrev()">Atrás</button>
      <button class="wbtn ok" id="wiz-next" onclick="wizNext()">Siguiente</button>
    </div>
  </div>
</div>
<style>
  .wiz-ov{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
  .wiz-bg{position:absolute;inset:0;background:rgba(4,5,7,.72);}
  .wiz-box{position:relative;z-index:1;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;
    background:var(--surf,#111317);border:1px solid var(--line,#20242B);border-radius:14px;box-shadow:0 20px 70px rgba(0,0,0,.6);}
  .wiz-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line,#20242B);}
  .wiz-tt{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:1.25rem;color:var(--fg,#F5F2EC);}
  .wiz-step{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut,#8A8F98);margin-top:3px;}
  .wiz-x{margin-left:auto;background:transparent;border:0;color:var(--mut,#8A8F98);font-size:1.5rem;cursor:pointer;line-height:1;}
  .wiz-body{padding:20px;overflow-y:auto;}
  .wiz-foot{display:flex;gap:10px;padding:15px 20px;border-top:1px solid var(--line,#20242B);}
  .wiz-foot .wbtn{flex:1;}
  .wbtn{border-radius:8px;padding:10px 14px;font-family:'Inter Tight',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:1px solid var(--line,#20242B);background:transparent;color:var(--fg,#F5F2EC);transition:.15s;}
  .wbtn.ok{background:#FF6A45;color:#0c0c0a;border-color:#FF6A45;} .wbtn.ok:hover{filter:brightness(.95);}
  .wbtn.done{background:#CCF24D;color:#0c0c0a;border-color:#CCF24D;}  /* tarea terminada */
  .wbtn.ghost{color:var(--mut,#8A8F98);} .wbtn:disabled{opacity:.5;cursor:default;}
  .wfld{margin-bottom:16px;} .wfld label{display:block;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut,#8A8F98);margin-bottom:6px;}
  .wfld input,.wfld textarea{width:100%;background:#0c0c0a;border:1px solid var(--line,#20242B);border-radius:7px;color:var(--fg,#F5F2EC);font-family:'Inter',sans-serif;font-size:.98rem;padding:10px 12px;outline:none;}
  .wfld textarea{min-height:110px;resize:vertical;line-height:1.4;} .wfld input:focus,.wfld textarea:focus{border-color:#CCF24D;}
  .wfld .hint{font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;color:#6f6f68;}
  .werr{color:#FF6A45;font-family:'JetBrains Mono',monospace;font-size:.66rem;margin-top:6px;min-height:14px;}
  .wcap{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid var(--line,#20242B);border-radius:10px;margin-bottom:9px;cursor:pointer;transition:.15s;}
  .wcap:hover{border-color:#8A8F98;} .wcap.on{border-color:#CCF24D;background:rgba(204,242,77,.06);}
  .wcap .wc-ic{display:grid;place-items:center;width:34px;height:34px;border-radius:8px;border:1px solid var(--line,#20242B);color:var(--mut,#8A8F98);flex:0 0 auto;}
  .wcap.on .wc-ic{border-color:#CCF24D;color:#CCF24D;}
  .wc-t{font-weight:700;color:var(--fg,#F5F2EC);} .wc-d{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--mut,#8A8F98);margin-top:2px;}
  .wc-chk{margin-left:auto;width:20px;height:20px;border-radius:6px;border:1px solid var(--line,#20242B);display:grid;place-items:center;color:#0c0c0a;flex:0 0 auto;}
  .wcap.on .wc-chk{background:#CCF24D;border-color:#CCF24D;} .wcap:not(.on) .wc-chk i{display:none;}
  .wc-dep{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#8A8F98;margin-top:4px;}
  .wsub{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--mut,#8A8F98);line-height:1.5;margin-bottom:14px;}
  .wdone{text-align:center;padding:14px 0;}
  .wdone .wd-ic{width:56px;height:56px;border-radius:50%;background:rgba(204,242,77,.12);color:#CCF24D;display:grid;place-items:center;margin:0 auto 14px;}
  /* Paso de descubrimiento: análisis de la presencia digital pública. */
  .wspin{width:40px;height:40px;border-radius:50%;border:3px solid var(--line,#20242B);border-top-color:#FF6A45;margin:0 auto 16px;animation:wsp 1s linear infinite;}
  @keyframes wsp{to{transform:rotate(360deg);}}
  .wlink{background:transparent;border:0;color:var(--mut,#8A8F98);font-family:'JetBrains Mono',monospace;font-size:.66rem;text-decoration:underline;cursor:pointer;padding:0;}
  .wlink:hover{color:#CCF24D;}
  .wfind{border:1px solid var(--line,#20242B);border-radius:10px;padding:13px 14px;margin-bottom:14px;}
  .wfind h4{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut,#8A8F98);margin-bottom:8px;}
  .wfind ul{margin:0;padding-left:16px;} .wfind li{font-size:.86rem;line-height:1.5;color:var(--fg,#F5F2EC);margin-bottom:6px;}
  .wconf{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;}
  .wconf i{width:7px;height:7px;border-radius:50%;display:block;}
  .wconf.alta{color:#CCF24D;} .wconf.alta i{background:#CCF24D;}
  .wconf.media{color:#FF6A45;} .wconf.media i{background:#FF6A45;}
  .wconf.baja{color:#8A8F98;} .wconf.baja i{background:#8A8F98;}
</style>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="shell.js"></script>
<script>ClausinaShell({active:'inicio'});</script>
<script>
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
async function entrar(slug){ try{ await fetch('api/marca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug})}); }catch(_){} location.href='proyecto'; }

// ---- Wizard "Sumá una marca" (Identidad -> Brief -> Capacidades -> crear) ----
const WIZ_CAPS = [
  {id:'estilo', label:'Estilo de marca', icon:'palette', desc:'Sistema de diseño e identidad visual'},
  {id:'instagram', label:'Instagram', icon:'instagram', desc:'Publicaciones del feed'},
  {id:'pauta', label:'Pauta Instagram', icon:'badge-dollar-sign', desc:'Publicidad (Meta Ads)', depende:['instagram']},
  {id:'pantalla', label:'Avisos en pantalla', icon:'megaphone', desc:'Pantalla de calle (DOOH)'},
  {id:'web', label:'Web / Landing', icon:'globe', desc:'Sitio de la marca'},
];
const WIZ_PASOS=5;
let _wz=null, _wzPoll=null;
function slugify(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40); }
function abrirWizard(){
  _wz={step:1,nombre:'',slug:'',slugTouched:false,slogan:'',brief_md:'',estilo_md:'',
       web:'',instagram:'',notas:'',email:'',whatsapp:'',logo:'',
       an:'form',  // form | analizando | listo | error  (estado del descubrimiento)
       desc_id:null,hallazgos:[],resumen:'',confianza:'',anErr:'',
       caps:new Set(),web_modo:'referencia',creando:false,creada:null};
  document.getElementById('wiz').style.display='flex'; wizRender();
}
function cerrarWizard(){ if(_wzPoll){clearInterval(_wzPoll);_wzPoll=null;} document.getElementById('wiz').style.display='none'; _wz=null; }

// --- Paso 1: descubrimiento de la presencia digital pública ---
async function wizAnalizar(){
  const w=_wz;
  if(!w.web.trim() && !w.instagram.trim()){ wizErr('Poné al menos la web o el Instagram'); return; }
  w.an='analizando'; w.anErr=''; wizRender();
  try{
    const d=await fetch('api/marcas/descubrir',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nombre:w.nombre,web:w.web,instagram:w.instagram,notas:w.notas})}).then(r=>r.json());
    if(!d.ok){ w.an='error'; w.anErr='No se pudo lanzar el análisis'; wizRender(); return; }
    w.desc_id=d.id;
    let intentos=0;
    _wzPoll=setInterval(async ()=>{
      if(!_wz){ clearInterval(_wzPoll); _wzPoll=null; return; }
      if(++intentos>150){ clearInterval(_wzPoll); _wzPoll=null; w.an='error'; w.anErr='El análisis tardó demasiado. Cargá los datos a mano.'; wizRender(); return; }
      try{
        const r=await fetch('api/marcas/descubrir/'+d.id).then(x=>x.json());
        if(r.estado==='listo'){ clearInterval(_wzPoll); _wzPoll=null; wizAplicar(r.resultado||{}); }
        else if(r.estado==='error'){ clearInterval(_wzPoll); _wzPoll=null; w.an='error'; w.anErr=r.error||'El análisis falló'; wizRender(); }
      }catch(_){}
    },4000);
  }catch(e){ w.an='error'; w.anErr='Error de conexión'; wizRender(); }
}
// Vuelca el análisis en el estado del wizard. Es una BASE editable: Fer revisa todo después.
function wizAplicar(r){
  const w=_wz, id=r.identidad||{};
  if(r.nombre && !w.nombre.trim()) w.nombre=r.nombre;
  w.slug = w.slugTouched ? w.slug : (r.slug || slugify(w.nombre));
  w.slogan = r.slogan || w.slogan;
  w.brief_md = r.brief_md || w.brief_md;
  w.estilo_md = r.estilo_md || '';
  w.logo = id.logo || '';
  w.email = id.email || '';
  w.whatsapp = id.whatsapp || '';
  w.web = id.dominio_web || w.web;
  w.instagram = id.ig_handle || w.instagram;
  w.caps = new Set(r.capacidades_sugeridas || []);
  WIZ_CAPS.forEach(c => { if(w.caps.has(c.id)) (c.depende||[]).forEach(x=>w.caps.add(x)); });
  if(r.web_modo) w.web_modo = r.web_modo;
  w.hallazgos = r.hallazgos || [];
  w.resumen = r.resumen || '';
  w.confianza = r.confianza || '';
  w.an='listo';
  wizRender();
}
function wizErr(m){ const e=document.getElementById('wz-err'); if(e) e.textContent=m||''; }
function wizNombre(v){ _wz.nombre=v; if(!_wz.slugTouched){ _wz.slug=slugify(v); const s=document.getElementById('wz-slug'); if(s) s.value=_wz.slug; } }
function wizToggleCap(id){ const w=_wz,c=WIZ_CAPS.find(x=>x.id===id);
  if(w.caps.has(id)){ w.caps.delete(id); WIZ_CAPS.forEach(x=>{ if((x.depende||[]).includes(id)) w.caps.delete(x.id); }); }
  else { w.caps.add(id); (c.depende||[]).forEach(d=>w.caps.add(d)); }
  wizRender(); }
function wizPrev(){ if(_wz.step>1){ _wz.step--; wizRender(); } }
function wizCapCard(c){ const on=_wz.caps.has(c.id);
  return `<div class="wcap${on?' on':''}" onclick="wizToggleCap('${c.id}')">
    <span class="wc-ic">${(c.id==='instagram'&&window.igIcon)?window.igIcon('w-4 h-4'):`<i data-lucide="${c.icon}" class="w-4 h-4"></i>`}</span>
    <div style="flex:1;min-width:0"><div class="wc-t">${c.label}</div><div class="wc-d">${c.desc}</div>${c.depende?`<div class="wc-dep">requiere: ${c.depende.join(', ')}</div>`:''}</div>
    <span class="wc-chk"><i data-lucide="check" class="w-3 h-3"></i></span></div>`; }
function wizRender(){
  const w=_wz; if(!w) return;
  const body=document.getElementById('wiz-body'), back=document.getElementById('wiz-back'), next=document.getElementById('wiz-next');
  document.getElementById('wiz-stepn').textContent = w.creada ? '' : `Paso ${w.step} de ${WIZ_PASOS}`;
  back.style.visibility = (w.step>1 && !w.creada) ? 'visible':'hidden'; next.disabled=false;
  next.style.display='';
  next.classList.toggle('done', !!w.creada);  // coral mientras falte algo; verde recién al terminar
  if(w.step===1){
    // Presencia digital: lo público de la marca. De acá sale la base de identidad.
    if(w.an==='analizando'){
      body.innerHTML=`<div class="wdone"><div class="wspin"></div>
        <div class="wiz-tt">Analizando la presencia digital</div>
        <div class="wsub" style="margin-top:8px">Estamos leyendo la web, buscando la marca y armando una base de identidad. Tarda unos minutos: podés dejar esta ventana abierta.</div></div>`;
      back.style.visibility='hidden'; next.style.display='none';
    } else if(w.an==='listo'){
      body.innerHTML=`
        <div class="wsub">Esto es lo que encontramos. Es una <b>base editable</b>: revisá y corregí todo en los pasos que siguen.</div>
        ${w.resumen?`<div class="wfld"><label>La marca</label><div style="color:var(--fg,#F5F2EC)">${esc(w.resumen)}</div></div>`:''}
        ${w.confianza?`<div class="wfld"><label>Confianza del análisis</label><span class="wconf ${esc(w.confianza)}"><i></i>${esc(w.confianza)}</span></div>`:''}
        ${w.hallazgos.length?`<div class="wfind"><h4>Hallazgos</h4><ul>${w.hallazgos.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>`:''}
        <button class="wlink" onclick="_wz.an='form';wizRender()">Volver a los datos y analizar de nuevo</button>`;
      next.textContent='Siguiente';
    } else {
      body.innerHTML=`
        <div class="wsub">Empecemos por lo <b>público</b> de la marca. Con esto analizamos su presencia digital y pre-cargamos identidad, brief y capacidades. Podés saltearlo y cargar todo a mano.</div>
        <div class="wfld"><label>Nombre de la marca</label><input value="${esc(w.nombre)}" placeholder="Ej: Distrito Ardora" oninput="wizNombre(this.value)"></div>
        <div class="wfld"><label>Web <span class="hint">— opcional</span></label><input value="${esc(w.web)}" placeholder="https://marca.com.ar" oninput="_wz.web=this.value;wizErr('')"></div>
        <div class="wfld"><label>Instagram <span class="hint">— opcional</span></label><input value="${esc(w.instagram)}" placeholder="@marca" oninput="_wz.instagram=this.value;wizErr('')"></div>
        <div class="wfld"><label>Otros datos públicos <span class="hint">— opcional: otras redes, dirección, a qué se dedica</span></label>
          <textarea placeholder="Lo que sepas: rubro, ubicación, enlaces…" oninput="_wz.notas=this.value">${esc(w.notas)}</textarea></div>
        ${w.an==='error'?`<div class="werr" style="min-height:auto;margin-bottom:12px">${esc(w.anErr)}</div>`:''}
        <div class="werr" id="wz-err"></div>
        <button class="wlink" onclick="_wz.step=2;wizRender()">Saltar el análisis y cargar a mano</button>`;
      next.textContent='Analizar presencia';
    }
  } else if(w.step===2){
    body.innerHTML=`
      <div class="wsub">La <b>identidad</b> de la marca. ${w.desc_id?'Pre-cargada con el análisis — revisala.':''}</div>
      <div class="wfld"><label>Nombre de la marca</label><input value="${esc(w.nombre)}" oninput="wizNombre(this.value)"></div>
      <div class="wfld"><label>Identificador (slug) <span class="hint">— minúsculas y guiones; se usa en URLs y en la cápsula</span></label>
        <input id="wz-slug" value="${esc(w.slug)}" placeholder="distrito-ardora" oninput="_wz.slug=this.value.toLowerCase();_wz.slugTouched=true;wizErr('')">
        <div class="werr" id="wz-err"></div></div>
      <div class="wfld"><label>Slogan <span class="hint">— opcional</span></label><input value="${esc(w.slogan)}" oninput="_wz.slogan=this.value"></div>
      <div class="wfld"><label>Web</label><input value="${esc(w.web)}" placeholder="https://marca.com.ar" oninput="_wz.web=this.value"></div>
      <div class="wfld"><label>Instagram</label><input value="${esc(w.instagram)}" placeholder="@marca" oninput="_wz.instagram=this.value"></div>
      <div class="wfld"><label>Mail <span class="hint">— opcional</span></label><input value="${esc(w.email)}" oninput="_wz.email=this.value"></div>
      <div class="wfld"><label>WhatsApp <span class="hint">— opcional</span></label><input value="${esc(w.whatsapp)}" oninput="_wz.whatsapp=this.value"></div>`;
    next.textContent='Siguiente';
  } else if(w.step===3){
    body.innerHTML=`
      <div class="wsub">El <b>brief</b> es el contexto que usa el creativo: propuesta de valor, tono, público, qué hacer y evitar, productos, datos clave. Aplica a todas las marcas.</div>
      <div class="wfld"><label>Brief <span class="hint">— opcional, recomendado</span></label><textarea style="min-height:220px" placeholder="Contá de qué va la marca…" oninput="_wz.brief_md=this.value">${esc(w.brief_md)}</textarea></div>
      ${w.estilo_md?`<div class="wfld"><label>Estilo visual <span class="hint">— detectado en el análisis; se guarda en el perfil</span></label><textarea oninput="_wz.estilo_md=this.value">${esc(w.estilo_md)}</textarea></div>`:''}`;
    next.textContent='Siguiente';
  } else if(w.step===4){
    body.innerHTML=`
      <div class="wsub"><b>Identidad</b>, <b>Brief</b> y <b>Biblioteca</b> vienen por defecto. Elegí qué otras capacidades querés (las configurás ahora o después).</div>
      ${WIZ_CAPS.map(wizCapCard).join('')}
      <div id="wz-webmodo" style="display:${w.caps.has('web')?'block':'none'};margin-top:6px">
        <div class="wsub" style="margin-bottom:8px">La web, ¿la administra ClaUsina o solo la referenciamos?</div>
        <div class="wcap${w.web_modo==='administrada'?' on':''}" onclick="_wz.web_modo='administrada';wizRender()"><div style="flex:1"><div class="wc-t">Administrada por ClaUsina</div><div class="wc-d">Publicamos y deployamos la landing</div></div><span class="wc-chk"><i data-lucide="check" class="w-3 h-3"></i></span></div>
        <div class="wcap${w.web_modo==='referencia'?' on':''}" onclick="_wz.web_modo='referencia';wizRender()"><div style="flex:1"><div class="wc-t">Solo referencia</div><div class="wc-d">La web existe pero no la administramos</div></div><span class="wc-chk"><i data-lucide="check" class="w-3 h-3"></i></span></div>
      </div>`;
    next.textContent='Siguiente';
  } else if(w.step===5){
    if(w.creada){
      body.innerHTML=`<div class="wdone"><div class="wd-ic"><i data-lucide="check" class="w-7 h-7"></i></div>
        <div class="wiz-tt">Marca creada</div>
        <div class="wsub" style="margin-top:8px">Estamos preparando la cápsula de <b>${esc(w.nombre)}</b> (unos segundos). Entrá y completá la configuración de cada capacidad.</div></div>`;
      back.style.visibility='hidden'; next.textContent='Entrar a la marca';
    } else {
      const caps=WIZ_CAPS.filter(c=>w.caps.has(c.id)).map(c=>c.label);
      body.innerHTML=`
        <div class="wsub">Repasá y creá la marca.</div>
        <div class="wfld"><label>Marca</label><div style="color:var(--fg,#F5F2EC)">${esc(w.nombre)} <span class="mono" style="color:#8A8F98">(${esc(w.slug)})</span></div></div>
        ${w.slogan?`<div class="wfld"><label>Slogan</label><div style="color:var(--fg,#F5F2EC)">${esc(w.slogan)}</div></div>`:''}
        ${(w.web||w.instagram)?`<div class="wfld"><label>Presencia</label><div style="color:var(--fg,#F5F2EC)">${[w.web,w.instagram].filter(Boolean).map(esc).join(' · ')}</div></div>`:''}
        <div class="wfld"><label>Brief</label><div style="color:var(--fg,#F5F2EC)">${w.brief_md.trim()?esc(w.brief_md.trim().slice(0,140))+'…':'<span class="mono" style="color:#8A8F98">sin brief (lo cargás después)</span>'}</div></div>
        <div class="wfld"><label>Capacidades</label><div style="color:var(--fg,#F5F2EC)">Identidad · Brief · Biblioteca${caps.length?' · '+caps.map(esc).join(' · '):''}</div></div>
        <div class="werr" id="wz-err"></div>`;
      next.textContent = w.creando ? 'Creando…' : 'Crear marca'; next.disabled=w.creando;
    }
  }
  if(window.lucide) lucide.createIcons();
  if(window.fixIgIcons) window.fixIgIcons(document.getElementById('wiz-body'));
}
async function wizNext(){
  const w=_wz; if(!w) return;
  if(w.creada){ entrar(w.creada); return; }
  if(w.step===1){
    if(w.an==='listo'){ w.step=2; }        // ya analizamos: seguimos con la base pre-cargada
    else { await wizAnalizar(); return; }  // botón "Analizar presencia"
  } else if(w.step===2){
    if(!w.nombre.trim()){ wizErr('Poné un nombre'); return; }
    if(!/^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$/.test(w.slug)){ wizErr('Slug inválido: minúsculas, números y guiones (3+ caracteres)'); return; }
    w.step=3;
  }
  else if(w.step===3){ w.step=4; }
  else if(w.step===4){ w.step=5; }
  else if(w.step===5){
    w.creando=true; wizRender();
    try{
      const d=await fetch('api/marcas/crear',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nombre:w.nombre.trim(),slug:w.slug,slogan:w.slogan,brief_md:w.brief_md,
          estilo_md:w.estilo_md,dominio_web:w.web,ig_handle:w.instagram,email:w.email,whatsapp:w.whatsapp,
          logo:w.logo,descubrimiento_id:w.desc_id,capacidades:[...w.caps],web_modo:w.web_modo})}).then(r=>r.json());
      if(d.ok){ w.creada=d.slug; }
      else { wizErr({slug_duplicado:'Ya existe una marca con ese identificador',slug_invalido:'Slug inválido',nombre_requerido:'Falta el nombre'}[d.error]||'No se pudo crear'); }
    }catch(e){ wizErr('Error de conexión'); }
    w.creando=false;
  }
  wizRender();
}

function cell(n,label,cls){ return `<div class="px-5 py-3"><div class="display font-bold text-2xl leading-none ${cls||''}">${n}</div><div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">${label}</div></div>`; }
function salud(p){ if(p.hace_s==null) return 'caido'; const r=p.hace_s/(p.intervalo_s||300); return r<=1.5?'ok':(r<=3?'warn':'caido'); }

function smRead(b,label,c){ return `<div><div class="display font-bold text-2xl leading-none ${c||''}">${b}</div><div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">${label}</div></div>`; }
// Consola de Sala de máquinas (misma que /maquinas): lámpara + estado + indicadores.
function renderConsola(marcas, maq){
  const lampEl=document.getElementById('sm-lamp'), stEl=document.getElementById('sm-state'), subEl=document.getElementById('sm-sub'), rdEl=document.getElementById('sm-reads');
  if(!maq){ lampEl.className='lamp paro'; stEl.textContent='Sin señal'; stEl.className='display font-extrabold text-2xl leading-none tracking-tight cor-text'; subEl.textContent='sin conexión con el motor'; rdEl.innerHTML=''; return; }
  const pl=maq.pipeline||{}, lg=maq.landing||{}, procs=maq.procesos||[];
  const caidos=procs.filter(p=>salud(p)==='caido').length;
  const sinLatido=caidos+Math.max(0,5-procs.length);
  const errores=(pl.errores||0)+(lg.errores||0);
  const espera=pl.espera||0, escal=pl.escalado||0, borr=lg.borrador||0, gen=lg.generando||0, rev=pl.revisando||0;
  const cola=marcas.reduce((a,m)=>a+(m.req_cola||0),0), hoy=pl.publicado_hoy||0;
  const pend=espera+escal+borr;
  const trab=(pl.generando||0)+rev+gen;
  let estado,sub,cls;
  if(sinLatido>0||errores>0){ estado='Revisar';cls='paro'; sub=sinLatido>0?`${sinLatido} proceso(s) sin latido`:`${errores} en error`; }
  else if(pend>0){ estado='Te espera';cls='espera'; sub=`${pend} pendiente(s) para tu visto`; }
  else if(trab>0){ estado='Trabajando';cls='espera'; sub=rev>0?`el creativo prepara ${rev} nueva(s) versión(es)`:`${trab} en curso · sin pendientes tuyos`; }
  else { estado='En marcha';cls='marcha'; sub='todo al día · sin pendientes tuyos'; }
  lampEl.className='lamp '+cls;
  stEl.textContent=estado; stEl.className='display font-extrabold text-2xl leading-none tracking-tight '+(cls==='paro'?'cor-text':'');
  subEl.textContent=sub;
  rdEl.innerHTML=[
    smRead(espera,'esperan tu visto',espera>0?'cor-text':''),
    smRead(rev,'en revisión',rev>0?'acc-text':''),
    smRead(borr,'borradores web',borr>0?'cor-text':''),
    smRead(gen,'web generando',gen>0?'acc-text':''),
    smRead(cola,'en cola'),
    smRead(escal,'escalados',escal>0?'cor-text':''),
    smRead((hoy>0?'+':'')+hoy,'publicado hoy',hoy>0?'acc-text':''),
  ].join('');
}

function metric(n,label,hot){ return `<div><div class="display font-extrabold text-3xl leading-none ${hot&&n>0?'cor-text':''}">${n}</div><div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">${label}</div></div>`; }
function card(p, primary){
  const espera=(p.ig_pend||0)+(p.av_pend||0), pub=(p.ig_pub||0)+(p.av_pub||0), needs=espera>0;
  const ini = esc((p.nombre||'?').trim().charAt(0).toUpperCase()||'?');
  const isUrl = p.logo && /^https?:\/\//.test(p.logo);
  const logo = isUrl ? `<img src="${esc(p.logo)}" alt="" class="w-10 h-10 rounded-xl object-contain border border-pline dark:border-line bg-psurf dark:bg-ink shrink-0" onerror="this.outerHTML='<div class=&quot;grid place-items-center w-10 h-10 rounded-xl border border-pline dark:border-line display font-bold text-base text-pmut dark:text-mut shrink-0&quot;>${ini}</div>'">`
                     : `<div class="grid place-items-center w-10 h-10 rounded-xl border border-pline dark:border-line display font-bold text-base text-pmut dark:text-mut shrink-0">${ini}</div>`;
  const dot = needs
    ? `<span class="w-2 h-2 rounded-full bg-cor live"></span><span class="mono text-[10px] cor-text uppercase tracking-wide">tu visto</span>`
    : (p.activo ? `<span class="w-2 h-2 rounded-full bg-acc breathe"></span><span class="mono text-[10px] acc-text uppercase tracking-wide">en señal</span>`
                : `<span class="w-2 h-2 rounded-full bg-mut"></span><span class="mono text-[10px] text-pmut dark:text-mut uppercase tracking-wide">inactiva</span>`);
  const arrow = primary
    ? `<span class="grid place-items-center w-10 h-10 rounded-full bg-acc text-accink shrink-0 group-hover:brightness-95 transition"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></span>`
    : `<span class="grid place-items-center w-10 h-10 rounded-full border border-current acc-text shrink-0 group-hover:bg-acc group-hover:text-accink group-hover:border-acc transition"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></span>`;
  return `<a href="#" onclick="entrar('${esc(p.slug)}');return false;" class="group rounded-2xl border ${needs?'border-cor/40':'border-pline dark:border-line'} bg-psurf dark:bg-surf card p-5 flex flex-col gap-5 hover:border-acc dark:hover:border-acc transition">
    <div class="flex items-start gap-3">
      ${logo}
      <div class="min-w-0"><h3 class="display font-bold text-lg tracking-tight truncate">${esc(p.nombre)}</h3><div class="mono text-[11px] text-pmut dark:text-mut mt-0.5 truncate">${esc(p.descripcion||'Sin descripción')}</div></div>
      <span class="ml-auto flex items-center gap-1.5 shrink-0">${dot}</span>
    </div>
    ${capChips(p.capacidades)}
    <div class="flex items-end justify-between">
      <div class="flex items-end gap-6">${metric(p.req_cola||0,'en cola')}${metric(espera,'tu visto',true)}${metric(pub,'publicado')}</div>
      ${arrow}
    </div>
  </a>`;
}
// Chips de capacidades: qué tiene configurada la marca de un vistazo.
function capChips(caps){
  if(!caps || !caps.length) return '';
  return `<div class="flex flex-wrap gap-1.5">` + caps.map(c=>{
    const st = !c.habilitada ? 'off' : (c.configurada ? 'ok' : 'cfg');
    const cls = st==='ok' ? 'border-acc/50 acc-text'
      : (st==='cfg' ? 'border-cor/50 cor-text' : 'border-pline dark:border-line text-pmut dark:text-mut opacity-40');
    const est = st==='ok' ? 'activa' : (st==='cfg' ? 'falta configurar: '+c.faltan.join(', ') : 'deshabilitada');
    const ico = (c.id==='instagram' && window.igIcon) ? window.igIcon('w-3 h-3') : `<i data-lucide="${esc(c.icon)}" class="w-3 h-3"></i>`;
    return `<span title="${esc(c.label+' — '+est)}" class="grid place-items-center w-6 h-6 rounded-md border ${cls}">${ico}</span>`;
  }).join('') + `</div>`;
}
function vacio(){ return `<a href="#" onclick="abrirWizard();return false;" class="group rounded-2xl border border-dashed border-pline dark:border-line p-5 grid place-items-center text-center min-h-[120px] hover:border-acc transition">
  <div><div class="w-10 h-10 rounded-xl grid place-items-center border border-pline dark:border-line mx-auto mb-2.5 group-hover:border-acc transition"><i data-lucide="plus" class="w-5 h-5 text-pmut dark:text-mut group-hover:acc-text"></i></div>
  <div class="display font-medium">Sumá una marca</div><p class="mono text-[11px] text-pmut dark:text-mut mt-1">Configurá la próxima cápsula.</p></div></a>`; }
function skel(){ return `<div class="rounded-2xl border border-pline dark:border-line bg-psurf dark:bg-surf card p-5">
  <div class="flex gap-3"><div class="w-10 h-10 rounded-xl bg-pline dark:bg-line"></div><div class="flex-1"><div class="h-4 w-1/2 rounded bg-pline dark:bg-line"></div><div class="h-3 w-3/4 rounded bg-pline dark:bg-line mt-2"></div></div></div>
  <div class="h-10 w-2/3 rounded bg-pline dark:bg-line mt-6"></div></div>`; }

async function cargar(){
  try{
    const [ra, rm, rc] = await Promise.all([ fetch('api/agencia'), fetch('api/maquinas'),
      fetch('api/capacidades/todas').then(r=>r.ok?r.json():[]).catch(()=>[]) ]);
    if(ra.status===401){ location.href='login'; return; }
    const marcas = await ra.json();
    const maq = rm.ok ? await rm.json() : null;
    const capsBySlug = {}; (rc||[]).forEach(x=>{ capsBySlug[x.slug]=x.capacidades; });
    marcas.forEach(m=>{ m.capacidades = capsBySlug[m.slug] || []; });
    const activas = marcas.filter(m=>m.activo).length;
    document.getElementById('sub').textContent = `agencia · ${activas} marca${activas===1?'':'s'} activa${activas===1?'':'s'}`;
    renderConsola(marcas, maq);
    document.getElementById('grid').innerHTML = marcas.length
      ? marcas.map((m,i)=>card(m, i===0)).join('') + vacio()
      : vacio();
    lucide.createIcons();
    if(window.fixIgIcons) window.fixIgIcons(document.getElementById('grid'));
  }catch(e){
    document.getElementById('sub').textContent = 'sin conexión';
  }
}
document.getElementById('grid').innerHTML = skel()+skel();
lucide.createIcons();
cargar();
setInterval(cargar, 30000);
</script>
</body>
