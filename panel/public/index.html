<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaUsina — Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23CCF24D'/%3E%3Cpath d='M9 8 V17 a7 7 0 0 0 14 0 V8' fill='none' stroke='%230A0B0D' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
</head>
<body class="bg-paper text-pfg dark:bg-ink dark:text-fg transition-colors">
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar bg-side dark:bg-sideD border-r border-pline dark:border-line flex flex-col gap-1 px-3 py-4 sticky top-0 h-[100dvh] overflow-y-auto">
    <div class="brandhead flex items-center gap-2.5 px-2 pb-3">
      <svg viewBox="0 0 28 34" width="18" height="22" fill="none" class="shrink-0">
        <path id="uS" d="M5 5 V19 a9 9 0 0 0 18 0 V5" class="stroke-pfg dark:stroke-fg" stroke-width="3.4" stroke-linecap="round"/>
        <circle r="2.2" fill="#CCF24D"><animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto"><mpath href="#uS"/></animateMotion></circle>
      </svg>
      <span class="wordmark display font-bold tracking-tight">ClaUsina<span class="acc-text">.</span></span>
      <button onclick="document.body.classList.toggle('col')" class="ml-auto grid place-items-center w-7 h-7 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-pmut dark:text-mut" aria-label="colapsar menú"><i data-lucide="panel-left-close" class="w-4 h-4"></i></button>
    </div>

    <button class="switch flex items-center gap-2.5 px-2.5 py-2 rounded-xl border border-pline dark:border-line mb-3 text-left opacity-90" title="Selector de marca (próximamente)">
      <span class="grid place-items-center w-6 h-6 rounded-lg bg-acc text-accink display font-bold text-xs shrink-0" id="sw-ini">C</span>
      <span class="switch-tx min-w-0"><span class="block text-sm display font-semibold truncate" id="sw-nombre">Cortafuego</span><span class="block mono text-[10px] text-pmut dark:text-mut">marca activa</span></span>
      <i data-lucide="chevrons-up-down" class="switch-tx w-4 h-4 ml-auto text-pmut dark:text-mut shrink-0"></i>
    </button>

    <nav class="nav flex flex-col gap-0.5">
      <div class="nsec mono text-[10px] tracking-[0.16em] uppercase text-pmut dark:text-mut px-2.5 mb-1">Agencia</div>
      <a href="." class="on flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm transition"><i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i><span class="nlabel">Inicio</span></a>
      <a href="maquinas" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="gauge" class="w-4 h-4 shrink-0"></i><span class="nlabel">Sala de máquinas</span></a>
      <a href="." class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="boxes" class="w-4 h-4 shrink-0"></i><span class="nlabel">Marcas</span></a>
      <a href="audiovisual" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="monitor" class="w-4 h-4 shrink-0"></i><span class="nlabel">Pantallas</span></a>
      <a href="estilo" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="palette" class="w-4 h-4 shrink-0"></i><span class="nlabel">Estilo</span></a>
      <a href="arquitectura" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="git-fork" class="w-4 h-4 shrink-0"></i><span class="nlabel">Arquitectura</span></a>

      <div class="nsec mono text-[10px] tracking-[0.16em] uppercase text-pmut dark:text-mut px-2.5 mt-4 mb-1">Marca activa</div>
      <a href="proyecto" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="inbox" class="w-4 h-4 shrink-0"></i><span class="nlabel">Cola y aprobación</span></a>
      <a href="instagram" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="instagram" class="w-4 h-4 shrink-0"></i><span class="nlabel">Instagram</span></a>
      <a href="avisos" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="megaphone" class="w-4 h-4 shrink-0"></i><span class="nlabel">Avisos</span></a>
      <a href="landing" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="globe" class="w-4 h-4 shrink-0"></i><span class="nlabel">Landing</span></a>
      <a href="perfil" class="flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-pfg dark:hover:text-fg hover:bg-black/5 dark:hover:bg-white/5 transition"><i data-lucide="settings-2" class="w-4 h-4 shrink-0"></i><span class="nlabel">Perfil</span></a>
    </nav>

    <div class="mt-auto flex items-center gap-1 pt-3">
      <button onclick="toggleMode()" class="grid place-items-center w-9 h-9 rounded-lg border border-pline dark:border-line hover:border-acc transition shrink-0" aria-label="modo">
        <i data-lucide="sun-medium" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
      </button>
      <button onclick="salir()" class="nlabel flex-1 flex items-center gap-2 px-2.5 py-2 rounded-lg text-sm text-pmut dark:text-mut hover:text-cor transition"><i data-lucide="log-out" class="w-4 h-4"></i> Salir</button>
    </div>
  </aside>
  <div class="backdrop" onclick="document.body.classList.remove('navopen')"></div>

  <!-- mobile top -->
  <div class="mtop flex items-center gap-2.5 px-5 h-14 bg-side dark:bg-sideD border-b border-pline dark:border-line">
    <button onclick="document.body.classList.toggle('navopen')" class="grid place-items-center w-9 h-9 -ml-2 rounded-lg" aria-label="menú"><i data-lucide="menu" class="w-5 h-5"></i></button>
    <span class="display font-bold tracking-tight">ClaUsina<span class="acc-text">.</span></span>
    <button onclick="toggleMode()" class="ml-auto grid place-items-center w-9 h-9 rounded-lg border border-pline dark:border-line" aria-label="modo"><i data-lucide="sun-medium" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
  </div>

  <!-- MAIN -->
  <main class="px-6 md:px-9 py-8 min-w-0">
    <div class="flex items-baseline gap-3 mb-4">
      <h1 class="display font-bold text-xl tracking-tight hl"><span>Inicio</span></h1>
      <span class="mono text-[11px] text-pmut dark:text-mut" id="sub">cargando…</span>
    </div>

    <div class="rounded-2xl bg-psurf dark:bg-surf border border-pline dark:border-line card mb-7 px-2 py-1 overflow-x-auto" id="statusbar"></div>

    <div class="mono text-[11px] tracking-[0.16em] uppercase text-pmut dark:text-mut mb-3">Las marcas</div>
    <section id="grid" class="grid md:grid-cols-2 gap-4"></section>
  </main>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toggleMode(){ const d=document.documentElement.classList.toggle('dark'); try{localStorage.setItem('clausina-mode',d?'dark':'light');}catch(_){}}
(function(){ try{ if(localStorage.getItem('clausina-mode')==='dark') document.documentElement.classList.add('dark'); }catch(_){} })();
async function salir(){ try{ await fetch('api/logout',{method:'POST'}); }catch(_){} location.href='login'; }
async function entrar(slug){ try{ await fetch('api/marca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug})}); }catch(_){} location.href='proyecto'; }

function cell(n,label,cls){ return `<div class="px-5 py-3"><div class="display font-bold text-2xl leading-none ${cls||''}">${n}</div><div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">${label}</div></div>`; }
function salud(p){ if(p.hace_s==null) return 'caido'; const r=p.hace_s/(p.intervalo_s||300); return r<=1.5?'ok':(r<=3?'warn':'caido'); }

function renderStatus(marcas, maq){
  const espera = maq ? (maq.pipeline.espera||0) : marcas.reduce((a,m)=>a+(m.ig_pend||0)+(m.av_pend||0),0);
  const cola = marcas.reduce((a,m)=>a+(m.req_cola||0),0);
  const hoy = maq ? (maq.pipeline.publicado_hoy||0) : 0;
  const escal = maq ? (maq.pipeline.escalado||0) : 0;
  const errores = maq ? (maq.pipeline.errores||0) : 0;
  const caidos = maq ? (maq.procesos||[]).filter(p=>salud(p)==='caido').length : 0;
  const motorOk = maq && caidos===0 && errores===0;
  const motor = !maq ? `<span class="display font-semibold text-base leading-none text-pmut dark:text-mut">s/d</span>`
    : motorOk ? `<span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-acc breathe"></span><span class="display font-semibold text-base leading-none">en marcha</span></span>`
              : `<span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-cor live"></span><span class="display font-semibold text-base leading-none cor-text">revisar</span></span>`;
  document.getElementById('statusbar').innerHTML = `<div class="flex divide-x divide-pline dark:divide-line min-w-max">
    ${cell(marcas.length,'marcas')}
    ${cell(espera,'esperan tu visto',espera>0?'cor-text':'')}
    ${cell(cola,'en cola')}
    ${cell((hoy>0?'+':'')+hoy,'publicado hoy',hoy>0?'acc-text':'')}
    <div class="px-5 py-3">${motor}<div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">el motor</div></div>
    ${cell(escal,'escalados',escal>0?'cor-text':'')}
  </div>`;
}

function metric(n,label,hot){ return `<div><div class="display font-extrabold text-3xl leading-none ${hot&&n>0?'cor-text':''}">${n}</div><div class="mono text-[10px] uppercase tracking-wide text-pmut dark:text-mut mt-1.5">${label}</div></div>`; }
function card(p, primary){
  const espera=(p.ig_pend||0)+(p.av_pend||0), pub=(p.ig_pub||0)+(p.av_pub||0), needs=espera>0;
  const ini = esc((p.nombre||'?').trim().charAt(0).toUpperCase()||'?');
  const isUrl = p.logo && /^https?:\/\//.test(p.logo);
  const logo = isUrl ? `<img src="${esc(p.logo)}" alt="" class="w-10 h-10 rounded-xl object-contain border border-pline dark:border-line bg-psurf dark:bg-ink shrink-0" onerror="this.outerHTML='<div class=&quot;grid place-items-center w-10 h-10 rounded-xl border border-pline dark:border-line display font-bold text-base text-pmut dark:text-mut shrink-0&quot;>${ini}</div>'">`
                     : `<div class="grid place-items-center w-10 h-10 rounded-xl border border-pline dark:border-line display font-bold text-base text-pmut dark:text-mut shrink-0">${ini}</div>`;
  const dot = needs
    ? `<span class="w-2 h-2 rounded-full bg-cor live"></span><span class="mono text-[10px] cor-text uppercase tracking-wide">tu visto</span>`
    : (p.activo ? `<span class="w-2 h-2 rounded-full bg-acc breathe"></span><span class="mono text-[10px] acc-text uppercase tracking-wide">en señal</span>`
                : `<span class="w-2 h-2 rounded-full bg-mut"></span><span class="mono text-[10px] text-pmut dark:text-mut uppercase tracking-wide">inactiva</span>`);
  const arrow = primary
    ? `<span class="grid place-items-center w-10 h-10 rounded-full bg-acc text-accink shrink-0 group-hover:brightness-95 transition"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></span>`
    : `<span class="grid place-items-center w-10 h-10 rounded-full border border-current acc-text shrink-0 group-hover:bg-acc group-hover:text-accink group-hover:border-acc transition"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></span>`;
  return `<a href="#" onclick="entrar('${esc(p.slug)}');return false;" class="group rounded-2xl border ${needs?'border-cor/40':'border-pline dark:border-line'} bg-psurf dark:bg-surf card p-5 flex flex-col gap-5 hover:border-acc dark:hover:border-acc transition">
    <div class="flex items-start gap-3">
      ${logo}
      <div class="min-w-0"><h3 class="display font-bold text-lg tracking-tight truncate">${esc(p.nombre)}</h3><div class="mono text-[11px] text-pmut dark:text-mut mt-0.5 truncate">${esc(p.descripcion||'Sin descripción')}</div></div>
      <span class="ml-auto flex items-center gap-1.5 shrink-0">${dot}</span>
    </div>
    <div class="flex items-end justify-between">
      <div class="flex items-end gap-6">${metric(p.req_cola||0,'en cola')}${metric(espera,'tu visto',true)}${metric(pub,'publicado')}</div>
      ${arrow}
    </div>
  </a>`;
}
function vacio(){ return `<div class="rounded-2xl border border-dashed border-pline dark:border-line p-5 grid place-items-center text-center min-h-[120px]">
  <div><div class="w-10 h-10 rounded-xl grid place-items-center border border-pline dark:border-line mx-auto mb-2.5"><i data-lucide="plus" class="w-5 h-5 text-pmut dark:text-mut"></i></div>
  <div class="display font-medium">Sumá una marca</div><p class="mono text-[11px] text-pmut dark:text-mut mt-1">Onboarding de la próxima cápsula.</p></div></div>`; }
function skel(){ return `<div class="rounded-2xl border border-pline dark:border-line bg-psurf dark:bg-surf card p-5">
  <div class="flex gap-3"><div class="w-10 h-10 rounded-xl bg-pline dark:bg-line"></div><div class="flex-1"><div class="h-4 w-1/2 rounded bg-pline dark:bg-line"></div><div class="h-3 w-3/4 rounded bg-pline dark:bg-line mt-2"></div></div></div>
  <div class="h-10 w-2/3 rounded bg-pline dark:bg-line mt-6"></div></div>`; }

async function cargar(){
  try{
    const [ra, rm] = await Promise.all([ fetch('api/agencia'), fetch('api/maquinas') ]);
    if(ra.status===401){ location.href='login'; return; }
    const marcas = await ra.json();
    const maq = rm.ok ? await rm.json() : null;
    const activas = marcas.filter(m=>m.activo).length;
    document.getElementById('sub').textContent = `agencia · ${activas} marca${activas===1?'':'s'} activa${activas===1?'':'s'}`;
    renderStatus(marcas, maq);
    document.getElementById('grid').innerHTML = marcas.length
      ? marcas.map((m,i)=>card(m, i===0)).join('') + vacio()
      : vacio();
    lucide.createIcons();
  }catch(e){
    document.getElementById('sub').textContent = 'sin conexión';
  }
}
document.getElementById('grid').innerHTML = skel()+skel();
lucide.createIcons();
cargar();
setInterval(cargar, 30000);
</script>
</body>
</html>
