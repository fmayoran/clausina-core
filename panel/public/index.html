<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaUsina — Dashboard</title>
<link rel="stylesheet" href="panel.css">
<link rel="icon" href="fonts/clausina-icono.png">
<link rel="apple-touch-icon" href="fonts/clausina-icono-180.png">
<style>
  header .logo b.dot{color:#1ec9ff;}
  .wrap{padding:20px 28px 60px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .ft{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;color:var(--white);font-weight:700;}
  .ibtn{background:transparent;border:1px solid var(--line);color:var(--ash);font-family:'IBM Plex Mono',monospace;font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;padding:7px 13px;border-radius:5px;cursor:pointer;text-decoration:none;display:inline-block;}
  .ibtn:hover{color:var(--chalk);border-color:var(--ash);}
  .ibtn.fire{color:var(--ember);border-color:#1d3a44;}
  .ibtn.fire:hover{background:var(--fire);border-color:var(--fire);color:#0c0c0a;}
  .navcta{color:#1ec9ff!important;border-color:#1ec9ff!important;}
  .navcta:hover{background:#1ec9ff!important;color:#070708!important;}
  .kpi.hot b{color:#1ec9ff;}
  .wrap{padding-top:24px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
  .pj{border:1px solid var(--line);border-radius:10px;background:#0c0c0a;padding:16px;display:flex;flex-direction:column;gap:11px;}
  .pjtop{display:flex;align-items:center;gap:11px;}
  .pjlogo{position:relative;width:64px;height:64px;border-radius:9px;background:#080806;border:1px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .pjlogo .ini{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2rem;color:var(--ash);}
  .pjlogo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:7px;}
  .pj h3{margin:0;font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;color:var(--white);font-weight:700;display:flex;align-items:center;gap:9px;}
  .pj .inact{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--ash);text-transform:uppercase;border:1px solid var(--line);border-radius:8px;padding:1px 7px;}
  .pj .desc{font-size:.92rem;color:var(--ash);line-height:1.4;min-height:38px;}
  .pj .links{display:flex;flex-wrap:wrap;gap:6px;}
  .pj .lk{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.03em;color:var(--ash);text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:3px 8px;transition:.15s;}
  .pj .lk:hover{color:#1ec9ff;border-color:#1ec9ff;}
  .kpis{display:flex;gap:8px;flex-wrap:wrap;}
  .kpi{flex:1;min-width:64px;background:#080806;border:1px solid var(--line);border-radius:7px;padding:8px 6px;text-align:center;}
  .kpi b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;color:var(--white);line-height:1;}
  .kpi.hot b{color:#1ec9ff;}
  .kpi span{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.03em;color:var(--ash);}
  .pj .acts{display:flex;gap:8px;margin-top:2px;}
  .pj .acts .ibtn{flex:1;text-align:center;}
</style>
</head>
<body class="dash">
  <header>
    <a class="logo" href=".">Cla<b>U</b>sina<b class="dot">.</b></a>
    <span class="sub">Agencia · impulsada por Claude</span>
    <span class="upd" id="upd"></span>
    <nav>
      <a href="audiovisual" class="navcta">Gestión de Pantallas</a>
      <button class="logout" onclick="salir()">Salir</button>
    </nav>
  </header>
  <div id="toast"></div>
  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>
<script src="panel.js"></script>
<script>
async function cargar(){
  try{
    const r=await fetch('api/agencia'); if(r.status===401){location.href='login';return;}
    const ps=await r.json();
    document.getElementById('grid').innerHTML = ps.length ? ps.map(card).join('') : '<div class="empty">— sin proyectos —</div>';
    const u=document.getElementById('upd'); if(u) u.textContent='actualizado '+new Date().toLocaleTimeString('es-AR');
  }catch(e){}
}
function kpi(n,label,hot){ return `<div class="kpi ${hot&&n>0?'hot':''}"><b>${n}</b><span>${label}</span></div>`; }
function card(p){
  const ini=esc((p.nombre||'?').trim().charAt(0).toUpperCase()||'?');
  const isUrl=p.logo && /^https?:\/\//.test(p.logo);
  const logo=`<div class="pjlogo"><span class="ini">${ini}</span>${isUrl?`<img src="${esc(p.logo)}" alt="" onerror="this.remove()">`:''}</div>`;
  const ig=p.ig_handle?`<a class="lk" href="https://instagram.com/${esc(p.ig_handle.replace(/^@/,''))}" target="_blank" rel="noopener">${esc(p.ig_handle)}</a>`:'';
  const web=p.dominio_web?`<a class="lk" href="${/^https?:\/\//.test(p.dominio_web)?esc(p.dominio_web):'https://'+esc(p.dominio_web)}" target="_blank" rel="noopener">${esc(p.dominio_web)}</a>`:'';
  const links=(ig||web)?`<div class="links">${ig}${web}</div>`:'';
  return `<div class="pj">
    <div class="pjtop">${logo}<h3>${esc(p.nombre)} ${p.activo?'':'<span class="inact">inactivo</span>'}</h3></div>
    <div class="desc">${esc(p.descripcion||'Sin descripción — cargá el perfil del proyecto.')}</div>
    ${links}
    <div class="kpis">
      ${kpi(p.req_cola,'en cola',true)}
      ${kpi(p.ig_pend,'IG pend.',true)}
      ${kpi(p.ig_pub,'IG public.')}
      ${kpi(p.av_pend,'avisos pend.',true)}
      ${kpi(p.av_pub,'en pantalla')}
    </div>
    <div class="acts">
      <button class="ibtn fire" onclick="entrar('${esc(p.slug)}')">Entrar al proyecto →</button>
      <button class="ibtn" onclick="entrar('${esc(p.slug)}','perfil')">Perfil</button>
    </div>
  </div>`;
}
async function entrar(slug, dest){
  try{ await fetch('api/marca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug})}); }catch(_){}
  location.href = dest || 'proyecto';
}
cargar();
</script>
</body>
</html>
