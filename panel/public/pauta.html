<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cortafuego — Pauta</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script>document.documentElement.classList.add('dark');</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
<link rel="stylesheet" href="panel.css">
</head>
<body>
  <header>
    <a class="logo" href=".">CORTA<b>FUEGO</b></a>
    <span class="sub">Pauta</span>
    <span class="upd" id="upd"></span>
    <nav>
      <a href="proyecto">← Proyecto</a>
      <button class="logout" onclick="salir()">Salir</button>
    </nav>
  </header>
<div class="shell"><main class="min-w-0">
  <div id="toast"></div>
  <div id="pauta" class="pauta"><div class="pauta-load">Cargando pauta…</div></div>

  <!-- Revisión de una propuesta de campaña -->
  <div id="campmodal" class="modal hidden">
    <div class="modal-bg" onclick="closeCamp()"></div>
    <div class="modal-box">
      <div class="modal-head"><div class="modal-tt">Propuesta de campaña</div><button class="modal-x" onclick="closeCamp()" title="Cerrar">×</button></div>
      <div class="modal-body" id="camp-body"></div>
      <div class="modal-foot" id="camp-acts"></div>
    </div>
  </div>

  <!-- Pedir una campaña al creativo -->
  <div id="campask" class="modal hidden">
    <div class="modal-bg" onclick="closeAsk()"></div>
    <div class="modal-box">
      <div class="modal-head"><div class="modal-tt">Pedir campaña al creativo</div><button class="modal-x" onclick="closeAsk()" title="Cerrar">×</button></div>
      <div class="modal-body">
        <div class="modal-sec">
          <div class="modal-lbl">Instrucción (opcional)</div>
          <textarea id="camp-instr" placeholder="Ej: promocionar la apertura, foco en Ranelagh, presupuesto chico. Dejalo vacío y propone a su criterio."></textarea>
        </div>
        <p class="cm-hint">El creativo propone objetivo, creativo, público y presupuesto. No se crea nada en Meta ni gasta hasta tu aprobación.</p>
      </div>
      <div class="modal-foot"><button class="btn no" onclick="closeAsk()">Cancelar</button><button class="btn ok" onclick="pedirCampania()">Pedir</button></div>
    </div>
  </div>
</main></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="shell.js"></script>
<script>ClausinaShell({active:'pauta',darkOnly:true});</script>
<script src="panel.js"></script>
<script>currentLoad=loadPauta; loadPauta(); setInterval(loadPauta,60000);</script>
</body>
</html>
