<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cortafuego — Avisos pantalla</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script>document.documentElement.classList.add('dark');</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tw.css">
<link rel="stylesheet" href="panel.css">
</head>
<body>
  <header>
    <a class="logo" href=".">CORTA<b>FUEGO</b></a>
    <span class="sub">Avisos · pantalla de calle</span>
    <span class="upd" id="upd"></span>
    <nav>
      <a href="proyecto">← Proyecto</a>
      <button class="logout" onclick="salir()">Salir</button>
    </nav>
  </header>
<div class="shell"><main class="min-w-0">
  <div id="toast"></div>
  <div class="board b2">
    <div class="col pend"><h2><span class="dot"></span>Pendiente de aprobación <span class="n" id="n-pend"></span>
      <button class="avsub" onclick="abrirSubirAviso()" title="Subir un aviso ya listo (de la biblioteca o de disco)" aria-label="Subir un aviso ya listo">
        <i data-lucide="upload" class="w-4 h-4"></i>
      </button></h2><div class="cards" id="c-pend"></div></div>
    <div class="col pub"><h2><span class="dot"></span>En pantalla <span class="n" id="n-pub"></span></h2><div class="cards" id="c-pub"></div></div>
  </div>
</main></div>

<!-- Subir un aviso ya listo (no lo hizo el creativo). Entra igual: pendiente de aprobación. -->
<div id="av-ov" class="avov">
  <div class="avbox">
    <div class="avhead">
      <b>Subir avisos</b>
      <span>material ya listo · queda pendiente de aprobación</span>
      <button onclick="cerrarSubirAviso()" title="Cerrar">×</button>
    </div>
    <div class="avbody">
      <div class="avfld">
        <label>Material <span class="avhint">— podés cargar varios; cada uno es un aviso</span></label>
        <div id="av-lista" class="avlista"><div class="avvacio">— elegí de la biblioteca o subí archivos —</div></div>
        <div class="avrow" style="margin-top:9px">
          <button class="avbtn" onclick="avDeBiblioteca()"><i data-lucide="folder-open" class="w-4 h-4"></i> Biblioteca</button>
          <button class="avbtn" onclick="document.getElementById('av-file').click()"><i data-lucide="hard-drive-upload" class="w-4 h-4"></i> Desde disco</button>
          <input type="file" id="av-file" accept="image/*,video/*" multiple style="display:none" onchange="avSubirArchivos(this)">
        </div>
        <div id="av-prog" class="avprog" style="display:none"><div class="avfill"></div></div>
      </div>
      <div class="avfld"><label>Momento <span class="avhint">— opcional, se aplica a todos</span></label><input id="av-mom" placeholder="pre-apertura, mediodía…"></div>
      <div class="averr" id="av-err"></div>
    </div>
    <div class="avfoot">
      <button class="avbtn" onclick="cerrarSubirAviso()">Cancelar</button>
      <button class="avbtn prim" id="av-crear" onclick="avCrear()">Mandar a aprobación</button>
    </div>
  </div>
</div>
<style>
  .col.pend h2 .n{margin-left:auto;}   /* el contador queda pegado al botón */
  .avsub{margin-left:10px;background:transparent;border:1px solid var(--line);color:var(--ash);width:28px;height:28px;border-radius:7px;cursor:pointer;display:grid;place-items:center;transition:.15s;flex:0 0 auto;}
  .avsub:hover{color:var(--pend);border-color:var(--pend);}
  .avov{position:fixed;inset:0;z-index:140;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(0,0,0,.7);}
  .avbox{background:#111317;border:1px solid #20242B;border-radius:14px;max-width:520px;width:100%;max-height:88vh;display:flex;flex-direction:column;}
  .avhead{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid #20242B;}
  .avhead b{font-family:'Inter Tight',sans-serif;font-size:16px;color:#ECEEF0;}
  .avhead span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ash);}
  .avhead button{margin-left:auto;background:none;border:0;color:var(--ash);font-size:22px;cursor:pointer;line-height:1;}
  .avbody{padding:18px;overflow-y:auto;}
  .avfoot{display:flex;gap:9px;padding:14px 18px;border-top:1px solid #20242B;}
  .avfoot .avbtn{flex:1;justify-content:center;}
  .avfld{margin-bottom:15px;}
  .avfld label{display:block;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ash);margin-bottom:6px;}
  .avhint{text-transform:none;letter-spacing:0;color:#6f6f68;}
  .avfld input{width:100%;background:#0c0c0a;border:1px solid var(--line);border-radius:7px;color:var(--white);font-family:'Inter',sans-serif;font-size:.95rem;padding:9px 11px;outline:none;}
  .avfld input:focus{border-color:var(--pend);}
  .avrow{display:flex;gap:9px;}
  .avbtn{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--line);color:var(--white);font-family:'Inter Tight',sans-serif;font-weight:700;font-size:.86rem;padding:9px 13px;border-radius:8px;cursor:pointer;transition:.15s;}
  .avbtn:hover{border-color:var(--ash);} .avbtn:disabled{opacity:.5;cursor:default;}
  .avbtn.prim{background:var(--pend);border-color:var(--pend);color:#0c0c0a;}   /* pendiente: coral */
  .avlista{border:1px dashed var(--line);border-radius:10px;background:#0c0c0a;padding:8px;max-height:260px;overflow-y:auto;}
  .avvacio{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#55554f;text-align:center;padding:26px 0;}
  .avit{display:grid;grid-template-columns:52px 1fr 74px 24px;gap:9px;align-items:center;padding:7px;border-radius:8px;}
  .avit + .avit{border-top:1px solid var(--line);}
  .avit .th{width:52px;height:52px;border-radius:6px;overflow:hidden;background:#16171a;display:grid;place-items:center;}
  .avit .th img,.avit .th video{width:100%;height:100%;object-fit:cover;}
  .avit input{width:100%;background:#0c0c0a;border:1px solid var(--line);border-radius:6px;color:var(--white);font-family:'Inter',sans-serif;font-size:.86rem;padding:6px 8px;outline:none;}
  .avit input:focus{border-color:var(--pend);}
  .avit .x{background:transparent;border:0;color:var(--ash);font-size:17px;cursor:pointer;line-height:1;}
  .avit .x:hover{color:var(--alarm);}
  .avprog{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px;}
  .avprog .avfill{height:100%;width:0;background:var(--pend);transition:width .2s,background .2s;}
  .avprog .avfill.hecho{background:var(--done);}
  .averr{color:var(--alarm);font-family:'JetBrains Mono',monospace;font-size:.66rem;min-height:14px;}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="shell.js"></script>
<script>ClausinaShell({active:'avisos',cap:'pantalla',darkOnly:true});</script>
<script src="panel.js"></script>
<script>currentLoad=loadAvisos; loadAvisos(); setInterval(loadAvisos,6000);
if(window.lucide) lucide.createIcons();</script>
<script>
// --- Subir avisos ya listos (biblioteca o disco). Nacen pendiente_aprobacion: nada llega a la
//     pantalla sin el visto de Fer, igual que los del creativo.
//     Se cargan VARIOS de una: cada archivo es un aviso, con su título y su duración. ---
let _avs = [];   // [{media_path, tipo, poster_url, titulo, duracion_s}]
const avErr = m => { document.getElementById('av-err').textContent = m || ''; };

function abrirSubirAviso(){
  _avs = [];
  document.getElementById('av-mom').value = '';
  avErr(''); avRender();
  document.getElementById('av-ov').style.display = 'flex';
  if(window.lucide) lucide.createIcons();
}
function cerrarSubirAviso(){ document.getElementById('av-ov').style.display = 'none'; }

function avRender(){
  const cont = document.getElementById('av-lista');
  if(!_avs.length){ cont.innerHTML = '<div class="avvacio">— elegí de la biblioteca o subí archivos —</div>'; avBoton(); return; }
  cont.innerHTML = _avs.map((a,i)=>{
    const u = 'media/'+a.media_path;
    const th = a.tipo==='video' ? `<video src="${esc(u)}#t=0.5" muted></video>` : `<img src="${esc(u)}">`;
    return `<div class="avit">
      <span class="th">${th}</span>
      <input value="${esc(a.titulo||'')}" placeholder="Título" oninput="_avs[${i}].titulo=this.value">
      <input type="number" min="1" max="120" value="${a.duracion_s||10}" title="Duración en segundos" oninput="_avs[${i}].duracion_s=this.value">
      <button class="x" title="Quitar" onclick="_avs.splice(${i},1);avRender()">×</button>
    </div>`;
  }).join('');
  avBoton();
}
function avBoton(){
  const b = document.getElementById('av-crear');
  b.textContent = _avs.length > 1 ? `Mandar ${_avs.length} a aprobación` : 'Mandar a aprobación';
  b.disabled = !_avs.length;
}
const yaEsta = mp => _avs.some(a => a.media_path === mp);

// --- Vía 1: la biblioteca. Multi-selección: se van sumando a la lista. ---
async function avDeBiblioteca(){
  let data; try{ data = await fetch('api/biblioteca').then(r=>r.json()); }
  catch(e){ avErr('No se pudo abrir la biblioteca'); return; }
  window._avItems = (data.items||[]);
  let ov = document.getElementById('avbp');
  if(!ov){ ov = document.createElement('div'); ov.id='avbp'; ov.className='bpov'; document.body.appendChild(ov);
           // .bpov trae z-index 120 y el modal del aviso está en 140: sin esto el selector queda
           // POR DETRÁS y los clicks no le llegan (no se podía elegir nada).
           ov.style.zIndex = '160';
           ov.addEventListener('click', e => { if(e.target===ov) ov.style.display='none'; }); }
  const cells = window._avItems.length ? window._avItems.map((m,i)=>{
    const u = 'media/'+m.media_path;
    const th = m.tipo==='video' ? `<video src="${esc(u)}#t=0.1" muted></video>` : `<img src="${esc(u)}" onerror="this.style.opacity=.15">`;
    const sel = yaEsta(m.media_path) ? ' bpadded' : '';
    return `<div class="bpcell${sel}" data-i="${i}" onclick="avToggle(${i},this)" title="${esc(m.nombre||'')}">${th}<span class="bpcode">${esc(m.codigo||'')}</span></div>`;
  }).join('') : '<div class="bpempty">— la biblioteca está vacía —</div>';
  ov.innerHTML = `<div class="bpbox">
      <div class="bphead"><b>Elegí el material</b><span>tocá los que quieras · cada uno es un aviso</span>
        <button onclick="document.getElementById('avbp').style.display='none'" title="Cerrar">×</button></div>
      <div class="bpgrid">${cells}</div>
      <div class="bphead" style="border-top:1px solid #20242B;border-bottom:0">
        <span id="avbp-n">${_avs.length} elegido(s)</span>
        <button class="avbtn prim" style="margin-left:auto" onclick="document.getElementById('avbp').style.display='none'">Listo</button></div>
    </div>`;
  ov.style.display = 'flex';
}
// Toca de nuevo = lo saca. Es un toggle: así se corrige sin cerrar y volver a abrir.
function avToggle(i, el){
  const m = window._avItems[i]; if(!m) return;
  const idx = _avs.findIndex(a => a.media_path === m.media_path);
  if(idx >= 0){ _avs.splice(idx,1); el.classList.remove('bpadded'); }
  else {
    _avs.push({ media_path:m.media_path, tipo:m.tipo, poster_url:null,
                titulo:(m.nombre||m.codigo||''), duracion_s:10 });
    el.classList.add('bpadded');
  }
  const n = document.getElementById('avbp-n');
  if(n) n.textContent = `${_avs.length} elegido(s)`;
  avErr(''); avRender();
}

// --- Vía 2: archivos del disco (varios a la vez). El video se comprime y el server devuelve
//     la duración REAL y el póster: no hay que adivinar segundos. ---
async function avSubirArchivos(input){
  const files = [...(input.files||[])]; input.value=''; if(!files.length) return;
  const prog = document.getElementById('av-prog'), fill = prog.querySelector('.avfill');
  prog.style.display='block'; fill.classList.remove('hecho'); fill.style.width='0';
  avErr('');
  let hechos = 0, fallados = 0;
  for(const f of files){
    const base = hechos / files.length;
    try{
      const d = await avSubirUno(f, (p)=>{ fill.style.width = Math.round((base + p/files.length)*100)+'%'; });
      if(d && d.ok){
        _avs.push({ media_path:d.media_path, tipo:d.tipo, poster_url:d.poster_url||null,
                    titulo:f.name.replace(/\.[^.]+$/,''), duracion_s:d.duracion_s || 10 });
        avRender();
      } else { fallados++; if(d && d.error) avErr(d.error); }
    }catch(e){ fallados++; }
    hechos++;
    fill.style.width = Math.round(hechos/files.length*100)+'%';
  }
  if(hechos && !fallados) fill.classList.add('hecho');   // verde: terminó
  if(fallados) avErr(`${fallados} archivo(s) no se pudieron subir`);
  setTimeout(()=>{ prog.style.display='none'; }, 800);
}
function avSubirUno(f, onProg){
  const esVideo = (f.type||'').startsWith('video/') || /\.(mp4|mov|webm|m4v)$/i.test(f.name);
  if(esVideo){
    if(f.size > 600*1024*1024) return Promise.resolve({ok:false, error:'Hay un video de más de 600MB'});
    return new Promise((resolve,reject)=>{
      const x = new XMLHttpRequest();
      x.open('POST','api/avisos/subir-video');
      x.setRequestHeader('Content-Type','application/octet-stream');
      x.upload.onprogress = e => { if(e.lengthComputable) onProg(e.loaded/e.total*0.92); };
      x.onload = () => { try{ resolve(JSON.parse(x.responseText)); }catch(_){ reject(new Error('respuesta inválida')); } };
      x.onerror = () => reject(new Error('falló la subida'));
      x.send(f);
    });
  }
  if(f.size > 85*1024*1024) return Promise.resolve({ok:false, error:'Hay una imagen de más de 85MB'});
  return new Promise((r,j)=>{ const rd=new FileReader(); rd.onload=()=>r(rd.result); rd.onerror=j; rd.readAsDataURL(f); })
    .then(dataUrl => { onProg(0.7);
      return fetch('api/avisos/subir',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({dataUrl, filename:f.name})}).then(r=>r.json()); });
}

// Un aviso por archivo. Si alguno falla, se informa: los que entraron quedan.
async function avCrear(){
  if(!_avs.length){ avErr('Falta el material'); return; }
  const sinTitulo = _avs.findIndex(a => !String(a.titulo||'').trim());
  if(sinTitulo >= 0){ avErr(`Falta el título del ${sinTitulo+1}º`); return; }
  const momento = document.getElementById('av-mom').value;
  const btn = document.getElementById('av-crear');
  btn.disabled = true; btn.textContent = 'Mandando…';
  let ok = 0, mal = 0;
  for(const a of _avs){
    try{
      const d = await fetch('api/avisos/manual',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ media_path:a.media_path, tipo:a.tipo, poster_url:a.poster_url,
          titulo:a.titulo, duracion_s:a.duracion_s, momento })}).then(r=>r.json());
      d.ok ? ok++ : mal++;
    }catch(e){ mal++; }
  }
  if(ok){
    cerrarSubirAviso();
    toast(ok===1 ? 'Aviso pendiente de aprobación' : `${ok} avisos pendientes de aprobación`);
    loadAvisos();
  }
  if(mal){ avErr(`${mal} no se pudieron crear`); }
  btn.disabled = false; avBoton();
}
</script>
</body>
</html>
